<script>
'use strict';
// ================================================================
// HOOPFIRE — 2-Player Arcade Basketball
// ================================================================
// P1 (Blue):  A/D=run  W/Space=jump  S=hold→SHOOT / tap→steal
// P2 (Red):  ←/→=run  ↑/RShift=jump  ↓=hold→SHOOT / tap→steal
// Hold action key to charge power — release to fire arc shot
// Run on the ground to auto-dribble · Dunk near the basket!
// ================================================================

const CVS = document.getElementById('c');
const ctx = CVS.getContext('2d');
const W = 1200, H = 630;
CVS.width = W; CVS.height = H;

// ── PHYSICS & LAYOUT ────────────────────────────────────────────
const GRAV    = 0.44;    // Gravity per frame
const FLOOR   = 505;     // Court floor Y
const P_SPD   = 5.6;     // Player run speed
const J_POW   = -15.4;   // Jump velocity
const B_R     = 13;      // Ball radius
const BNCE    = 0.52;    // Ball bounce damping
const FRIC    = 0.86;    // Floor friction
let WIN_PTS = 5;       // First to this score wins — no time limit (mutable: online rooms can override up to 99)

// Hoop geometry — two baskets facing each other
// Left  hoop: P2 attacks → P2 scores when ball drops through
// Right hoop: P1 attacks → P1 scores when ball drops through
const LH = { pole:88,  bx:82,  bx2:98,  by1:190, by2:325, ax:98,  rimX:144, rimRX:199, rimY:266 };
const RH = { pole:1112,bx:1102,bx2:1118,by1:190, by2:325, ax:1102,rimX:1001,rimRX:1056,rimY:266 };
const LRIM_CX = (LH.rimX + LH.rimRX) / 2;  // ~171.5
const RRIM_CX = (RH.rimX + RH.rimRX) / 2;  // ~1028.5
const RIM_W   = LH.rimRX - LH.rimX;         // 55

// ── INPUT ────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
  K[e.code] = true;
  const g = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
             'KeyW','KeyA','KeyS','KeyD','ShiftRight'];
  if (g.includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// ── AUDIO (Web Audio API — procedural sfx) ──────────────────────
let AC = null;
function initAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }

function tone(hz, type, dur, vol=0.28, delay=0, slide=0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  const s = AC.currentTime + delay;
  o.frequency.setValueAtTime(hz, s);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, s + dur);
  g.gain.setValueAtTime(vol, s);
  g.gain.exponentialRampToValueAtTime(0.0001, s + dur);
  o.start(s); o.stop(s + dur + 0.01);
}

const SFX = {
  bounce: () => tone(155,'sine',0.1,0.22,0,80),
  swish:  () => { tone(900,'sine',0.13,0.26,0,500); tone(600,'sine',0.18,0.18,0.07); },
  rim:    () => { tone(255,'square',0.11,0.32); tone(190,'square',0.09,0.25,0.07); },
  steal:  () => { tone(560,'sawtooth',0.07,0.26); tone(820,'sawtooth',0.06,0.18,0.06); },
  pass:   () => { tone(440,'sine',0.08,0.18,0,640); },
  block:  () => { tone(170,'square',0.13,0.38); tone(280,'square',0.09,0.22,0.05); },
  dunk:   () => { tone(95,'sawtooth',0.22,0.48,0,50); tone(190,'sine',0.14,0.28,0.1); },
  score:  () => {
    [523,659,784,1047,1319].forEach((f,i) => tone(f,'square',0.14,0.2,i*0.09));
    tone(1568,'sine',0.28,0.16,0.47);
  },
  buzz:   () => { tone(120,'sawtooth',0.5,0.5); },
};

// ── PARTICLES ────────────────────────────────────────────────────
const PARTS = [];

function burst(x, y, colors, n=40, spd=10) {
  for (let i=0; i<n; i++) {
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*spd + 2;
    PARTS.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - Math.random()*4,
      r: Math.random()*4.5+1.5,
      col: colors[Math.floor(Math.random()*colors.length)],
      life:1, decay:Math.random()*0.015+0.01,
      shape: Math.random()<0.55 ? 0 : 1, // 0=square,1=circle
      rot:Math.random()*Math.PI*2, rspd:(Math.random()-0.5)*0.28,
    });
  }
}

function rimFlare(x, y) {
  for (let i=0; i<10; i++) {
    const a=Math.random()*Math.PI*2;
    PARTS.push({ x, y, vx:Math.cos(a)*5, vy:Math.sin(a)*5-1,
      r:Math.random()*3+2, col:'#ff8800', life:0.65, decay:0.07,
      shape:1, rot:0, rspd:0 });
  }
}

function updateParts() {
  for (let i=PARTS.length-1; i>=0; i--) {
    const p=PARTS[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=GRAV*0.38; p.vx*=0.97;
    p.life-=p.decay; p.rot+=p.rspd;
    if(p.life<=0) PARTS.splice(i,1);
  }
}

function drawParts() {
  for (const p of PARTS) {
    ctx.save();
    ctx.globalAlpha = Math.max(0,p.life);
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.col;
    if (p.shape===1) { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
    else ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);
    ctx.restore();
  }
}

// ── FLOATING SCORE TEXTS ─────────────────────────────────────────
const FTEXTS = [];
function addFText(x, y, text, color) {
  FTEXTS.push({ x, y, vy:-2.2, text, color, life:1 });
}
function updateFTexts() {
  for (let i=FTEXTS.length-1;i>=0;i--) {
    const t=FTEXTS[i]; t.y+=t.vy; t.vy*=0.94; t.life-=0.012;
    if (t.life<=0) FTEXTS.splice(i,1);
  }
}
function drawFTexts() {
  for (const t of FTEXTS) {
    ctx.save();
    ctx.globalAlpha = Math.max(0,t.life);
    ctx.textAlign='center'; ctx.font='bold 44px Arial Black';
    ctx.shadowColor=t.color; ctx.shadowBlur=18;
    ctx.fillStyle=t.color;
    ctx.fillText(t.text, t.x, t.y);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ── SCREEN SHAKE ─────────────────────────────────────────────────
let SHAKE = 0;
function shake(amt) { SHAKE = Math.max(SHAKE, amt); }

// Cosmetic decay — screen shake, crowd hype, score flash, round banner,
// particles, and floating text. Runs once per frame regardless of game
// STATE (so it also animates during jumpball/checking), and continues
// working on the guest's side even though the guest never runs update().
function updateCosmeticFX(dt) {
  SHAKE = Math.max(0, SHAKE*0.78-0.25);
  crowdHype = Math.max(0, crowdHype-0.007);
  if (scoreFlashT>0) scoreFlashT--;
  if (roundCondBannerT>0) roundCondBannerT--;
  updateParts();
  updateFTexts();
}

// ── BALL ─────────────────────────────────────────────────────────
const BALL = {
  x:W/2, y:FLOOR-70, vx:0, vy:0,
  px:W/2, py:FLOOR-70,
  rot:0, owner:-1, lastShooter:-1,
  justScored:false, pickupDelay:0, shotWas3:false,
  isDunk:false,      // Prevents block deflection during a dunk
  blockDelay:0,      // Frames after launch during which blocks are suppressed
  trail:[],

  reset() {
    this.x=W/2; this.y=FLOOR-70; this.vx=0; this.vy=0;
    this.px=W/2; this.py=FLOOR-70; this.rot=0;
    this.owner=-1; this.lastShooter=-1;
    this.justScored=false; this.pickupDelay=0; this.shotWas3=false;
    this.isDunk=false; this.blockDelay=0;
    this.trail=[];
  },

  // Launch toward target hoop.
  // vx is FIXED (always reaches rim horizontally at time T).
  // vy is VARIABLE — charge controls the arc HEIGHT only:
  //   0% charge  → vyFactor 0.20 → ball barely rises, falls short
  //  64% charge  → vyFactor 1.00 → PERFECT: ball arcs exactly through rim
  //  80% charge  → vyFactor 1.20 → arc too high, overshoots
  // 100% charge  → vyFactor 1.45 → ALWAYS misses, ball goes nearly straight up
  // shootSkill (0-1, from the Shooting stat) adds consistency: a low-skill
  // shooter's arc jitters randomly even with perfect timing; a 100-skill
  // shooter's release matches their input exactly.
  launch(sx, sy, tx, ty, chargeFrac=0.64, shootSkill=0.5) {
    this.owner      = -1;
    this.pickupDelay= 22;
    this.blockDelay = 28;

    const dx  = tx - sx;
    const T   = Math.max(18, Math.abs(dx) / 14);
    this.vx = dx / T;

    // For heavy/bouncy balls, the "perfect" vy must compensate for the different gravity
    const gravMult = roundBallType==='heavy' ? 1.55 : roundBallType==='bouncy' ? 0.75 : 1.0;
    const perfectVy = (ty - sy - 0.5 * GRAV * gravMult * T * T) / T;

    // Scale by charge: vyFactor = 1.0 at 64% charge → perfect arc
    let vyFactor = 0.20 + chargeFrac * 1.25;

    // Shooting-skill jitter: low skill adds up to ±6% random wobble to the arc
    const jitterMag = (1 - shootSkill) * 0.06;
    vyFactor += (Math.random()*2 - 1) * jitterMag;

    this.vy = perfectVy * vyFactor;

    this.x = sx; this.y = sy;
    this.trail = [];
    SFX.swish();
  },

  update() {
    if (this.owner>=0) { this.trail=[]; return; }
    if (this.pickupDelay>0) this.pickupDelay--;
    if (this.blockDelay>0)  this.blockDelay--;   // ← Countdown post-launch block immunity
    this.px=this.x; this.py=this.y;

    // Per-round ball physics (heavy=sinks fast, bouncy=floats and bounces high)
    const gravMult = roundBallType==='heavy' ? 1.55 : roundBallType==='bouncy' ? 0.75 : 1.0;
    const bncMult  = roundBallType==='heavy' ? 0.28 : roundBallType==='bouncy' ? 0.82 : BNCE;
    const fricMult = roundBallType==='heavy' ? 0.78 : roundBallType==='bouncy' ? 0.92 : FRIC;

    this.vy+=GRAV*gravMult;
    this.x+=this.vx; this.y+=this.vy;
    this.rot+=this.vx*0.05;

    // Trail history
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length>14) this.trail.shift();

    // Floor bounce
    if (this.y+B_R>=FLOOR) {
      this.y=FLOOR-B_R;
      if (Math.abs(this.vy)>2) SFX.bounce();
      this.vy*=-bncMult; this.vx*=fricMult;
      if (Math.abs(this.vy)<0.5) this.vy=0;
    }
    // Ceiling
    if (this.y-B_R<18) { this.y=18+B_R; this.vy*=-0.4; }
    // Side walls
    if (this.x-B_R<0)   { this.x=B_R;    this.vx*=-0.7; }
    if (this.x+B_R>W)   { this.x=W-B_R;  this.vx*=-0.7; }

    // Left backboard — ball hits from the right
    if (this.vx<0 && this.x-B_R<=LH.bx2+2 && this.x-B_R>=LH.bx-6
        && this.y>=LH.by1-B_R && this.y<=LH.by2+B_R) {
      this.x=LH.bx2+2+B_R; this.vx=Math.abs(this.vx)*0.62; SFX.rim();
    }
    // Right backboard — ball hits from the left
    if (this.vx>0 && this.x+B_R>=RH.bx-2 && this.x+B_R<=RH.bx2+6
        && this.y>=RH.by1-B_R && this.y<=RH.by2+B_R) {
      this.x=RH.bx-2-B_R; this.vx=-Math.abs(this.vx)*0.62; SFX.rim();
    }

    // Rim post collisions — circular bounce off each post
    const posts=[{x:LH.rimX,y:LH.rimY},{x:LH.rimRX,y:LH.rimY},
                 {x:RH.rimX,y:RH.rimY},{x:RH.rimRX,y:RH.rimY}];
    for (const p of posts) {
      const dx=this.x-p.x, dy=this.y-p.y, d=Math.hypot(dx,dy);
      if (d<B_R+5 && d>0.1) {
        const nx=dx/d, ny=dy/d;
        this.x=p.x+nx*(B_R+5); this.y=p.y+ny*(B_R+5);
        const dot=this.vx*nx+this.vy*ny;
        this.vx=(this.vx-1.8*dot*nx)*0.58;
        this.vy=(this.vy-1.8*dot*ny)*0.58;
        SFX.rim(); rimFlare(p.x,p.y);
      }
    }
  },

  // Returns which player scored, or -1
  checkScore() {
    if (this.owner>=0 || this.justScored) return -1;
    for (const [h, scorer] of [[LH,1],[RH,0]]) {
      const cx2=(h.rimX+h.rimRX)/2, hw=(h.rimRX-h.rimX)/2;
      if (this.vy>0 && this.py<h.rimY && this.y>=h.rimY
          && Math.abs(this.x-cx2) < hw - B_R + 9) {
        return scorer;
      }
    }
    return -1;
  },

  draw() {
    const shadowS = Math.max(0.15, 1-(FLOOR-this.y-B_R)/420);

    // ── HEAVY BALL: dark metallic sphere ──────────────────────────
    if (roundBallType === 'heavy') {
      // Floor shadow
      ctx.beginPath();
      ctx.ellipse(this.x, FLOOR+5, B_R*shadowS*0.88, 5*shadowS, 0, 0, Math.PI*2);
      ctx.fillStyle=`rgba(0,0,0,${0.38*shadowS})`; ctx.fill();

      // Short dark trail
      for (let i=0; i<this.trail.length; i++) {
        const t=(i+1)/this.trail.length;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, B_R*t*0.42, 0, Math.PI*2);
        ctx.fillStyle=`rgba(60,60,80,${t*0.18})`;
        ctx.fill();
      }

      ctx.save();
      ctx.translate(this.x, this.y); ctx.rotate(this.rot);

      // Main sphere — brushed dark steel gradient
      const mg = ctx.createRadialGradient(-5,-6,1,0,0,B_R);
      mg.addColorStop(0,  '#c8c8d8');   // bright highlight spot
      mg.addColorStop(0.18,'#888898');
      mg.addColorStop(0.55,'#44444e');
      mg.addColorStop(0.82,'#28282e');
      mg.addColorStop(1,   '#111118');
      ctx.beginPath(); ctx.arc(0,0,B_R,0,Math.PI*2);
      ctx.fillStyle=mg; ctx.fill();

      // Thin rim/edge darkening
      ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,0,B_R,0,Math.PI*2); ctx.stroke();

      // Engraved seam lines — like a cannonball
      ctx.strokeStyle='rgba(0,0,0,0.40)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(0,0,B_R,0.14,Math.PI-0.14); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,B_R,Math.PI+0.14,-0.14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-B_R); ctx.lineTo(0,B_R); ctx.stroke();

      // Secondary sheen band (brushed metal look)
      const sheen = ctx.createLinearGradient(-B_R,-B_R,B_R,B_R);
      sheen.addColorStop(0,'rgba(255,255,255,0)');
      sheen.addColorStop(0.42,'rgba(255,255,255,0.08)');
      sheen.addColorStop(0.5,'rgba(255,255,255,0.16)');
      sheen.addColorStop(0.58,'rgba(255,255,255,0.06)');
      sheen.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(0,0,B_R,0,Math.PI*2);
      ctx.fillStyle=sheen; ctx.fill();

      // Primary specular
      ctx.beginPath(); ctx.arc(-4,-5,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
      // Small secondary specular
      ctx.beginPath(); ctx.arc(-6,-6.5,1.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fill();

      ctx.restore();
      if (roundTwist === 'double') this._drawRainbow();
      return;
    }

    // ── BOUNCY BALL: lighter, smaller, bright ──────────────────────
    if (roundBallType === 'bouncy') {
      const r = B_R * 0.82; // slightly smaller

      // Trail — brighter for bouncy
      for (let i=0; i<this.trail.length; i++) {
        const t=(i+1)/this.trail.length;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, r*t*0.45, 0, Math.PI*2);
        ctx.fillStyle=`rgba(80,180,255,${t*0.22})`;
        ctx.fill();
      }

      // Shadow
      ctx.beginPath();
      ctx.ellipse(this.x, FLOOR+5, r*shadowS*0.88, 4*shadowS, 0, 0, Math.PI*2);
      ctx.fillStyle=`rgba(0,0,0,${0.20*shadowS})`; ctx.fill();

      ctx.save();
      ctx.translate(this.x, this.y); ctx.rotate(this.rot);

      // Bright blue-white gradient
      const bg = ctx.createRadialGradient(-3,-4,1,0,0,r);
      bg.addColorStop(0,'#d0f0ff');
      bg.addColorStop(0.4,'#44aaff');
      bg.addColorStop(1,'#0055cc');
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fillStyle=bg; ctx.fill();

      // Seam lines (lighter)
      ctx.strokeStyle='rgba(0,80,200,0.5)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(0,0,r,0.14,Math.PI-0.14); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,r,Math.PI+0.14,-0.14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(0,r); ctx.stroke();

      // Large bright specular (looks lighter/airier)
      ctx.beginPath(); ctx.arc(-3,-4,4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
      ctx.beginPath(); ctx.arc(-4,-5,2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.30)'; ctx.fill();

      ctx.restore();
      if (roundTwist === 'double') this._drawRainbow();
      return;
    }

    // ── NORMAL BASKETBALL (default) ───────────────────────────────
    for (let i=0; i<this.trail.length; i++) {
      const t=(i+1)/this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, B_R*t*0.48, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,110,15,${t*0.2})`;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.ellipse(this.x, FLOOR+5, B_R*shadowS*0.88, 5*shadowS, 0, 0, Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,${0.28*shadowS})`; ctx.fill();

    ctx.save();
    ctx.translate(this.x, this.y); ctx.rotate(this.rot);

    const grad = ctx.createRadialGradient(-4,-5,1,0,0,B_R);
    grad.addColorStop(0,'#ffaa44');
    grad.addColorStop(0.55,'#ff6600');
    grad.addColorStop(1,'#cc3300');
    ctx.beginPath(); ctx.arc(0,0,B_R,0,Math.PI*2);
    ctx.fillStyle=grad; ctx.fill();

    ctx.strokeStyle='#882200'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0,0,B_R,0.14,Math.PI-0.14); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,B_R,Math.PI+0.14,-0.14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-B_R); ctx.lineTo(0,B_R); ctx.stroke();

    ctx.beginPath(); ctx.arc(-4,-5,3.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,220,150,0.38)'; ctx.fill();

    ctx.restore();

    // ── DOUBLE-POINTS RAINBOW SHIMMER ─────────────────────────────
    // Drawn in world coords after all ball types so it overlays without
    // masking the underlying shape. Semi-transparent so ball type is clear.
    if (roundTwist === 'double') this._drawRainbow();
  },

  _drawRainbow() {
    const t = Date.now() / 420;
    const r = (roundBallType === 'bouncy' ? B_R * 0.82 : B_R) + 1;

    ctx.save();
    ctx.translate(this.x, this.y);

    // Clip all drawing to the ball circle
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();

    // ── Rotating rainbow wedge segments ─────────────────────────────
    const STEPS = 12;
    for (let i = 0; i < STEPS; i++) {
      const a0  = (i / STEPS) * Math.PI * 2 + t;
      const a1  = ((i + 1) / STEPS) * Math.PI * 2 + t;
      const hue = (i / STEPS) * 360;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, a0, a1);
      ctx.closePath();
      ctx.fillStyle = `hsla(${hue},100%,62%,0.22)`;
      ctx.fill();
    }

    // ── Orbiting white glint ─────────────────────────────────────────
    const gx = Math.cos(t * 1.7) * r * 0.62;
    const gy = Math.sin(t * 1.7) * r * 0.62;
    const glintGrad = ctx.createRadialGradient(gx, gy, 0, gx, gy, r * 0.36);
    glintGrad.addColorStop(0, 'rgba(255,255,255,0.52)');
    glintGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = glintGrad; ctx.fill();

    ctx.restore();
  }
};

// ── Unified input resolver ───────────────────────────────────────────
// Used by BOTH Player.update() and updateChecking() so every place that
// reads a player's input agrees on where that input actually comes from.
// This fixes two things at once:
//   1) A solo local human (1P mode's player, or an online host's own
//      side) can use EITHER WASD or Arrow keys — no need to memorize
//      which half of the keyboard is "theirs" when nobody else is
//      sharing that keyboard.
//   2) The online host's game logic (including the check-ball sequence)
//      correctly reads the GUEST's action key from NET_REMOTE_KEYS
//      instead of accidentally reading the host's own local keyboard —
//      previously only updateChecking() had this bug, since it read
//      straight from K instead of going through the same resolver
//      Player.update() used.
function _isActionHeld(idx, action) {
  const p = PLAYERS[idx];

  if (gameMode === '1p' && idx === BOT_IDX) {
    return !!BOT_KEYS[p.cfg[action]];
  }
  if (onlineActive && onlineIsHost && idx === 1) {
    // Host reading the remote guest's input (merged WASD+Arrows already
    // happened on the guest's own device before it was sent — see
    // netMaybeSendInput())
    return !!NET_REMOTE_KEYS[p.cfg[action]];
  }

  // Solo local human: nobody else is sharing this physical keyboard,
  // so accept either key layout for their movement/jump/action.
  const soloLocalHuman =
       (gameMode === '1p' && idx === 0) ||
       (onlineActive && onlineIsHost && idx === 0);
  if (soloLocalHuman) {
    return !!(K[P1.cfg[action]] || K[P2.cfg[action]]);
  }

  // 2P local mode — exclusive bindings (P1=WASD, P2=Arrows) since two
  // different people are sharing one physical keyboard.
  return !!K[p.cfg[action]];
}

// ── PLAYER ───────────────────────────────────────────────────────
class Player {
  constructor(idx, startX, cfg) {
    this.idx = idx;
    this.x   = startX; this.y = FLOOR;
    this.vx  = 0; this.vy = 0;
    this.dir = idx===0 ? 1 : -1;
    this.grounded = true;
    this.hasBall  = false;
    this.shootCD  = 0;   // Post-shot cooldown (frames)
    this.stealCD  = 0;   // Passive steal immunity (frames)
    this.celebT   = 0;   // Celebration frames
    this.lastPts  = 2;
    this.poseT    = 0;
    this.pose     = 'idle';
    this.legPh    = 0;
    this.dribbleT = 0;   // Dribble bounce phase
    this.dunkType  = 'simple';  // 'simple' or 'windmill'
    this.dunkAnimT = 0;         // Post-fire dunk animation countdown (frames)
    this.wasJump   = false;
    this.wasAction = false;  // Previous state of the action key (shoot / steal)
    this.hadBallLastFrame     = false; // Tracks possession transitions
    this.requireActionRelease = false; // Prevents auto-shoot on ball pickup
    this.landedWhileCharging  = false; // Locks l/r movement after landing mid-charge
    // ── Charge shot ──
    this.chargeT   = 0;
    this.maxCharge = 68;
    this.isCharg   = false;
    // ── Steal cooldown display ──
    this.stealActCD = 0;   // ms countdown shown above head
    // ── ROUND CHARACTERISTICS (re-rolled each round, see generateRoundStats) ──
    this.statShoot    = 50;  // Shooting: shot consistency (less jitter at higher values)
    this.statHeight   = 50;  // Height: visual scale + dunk reach window
    this.statAthletic = 50;  // Athleticism: jump power + run speed
    this.statDefence  = 50;  // Defence: steal radius
    this.heightScale  = 1;   // Derived from statHeight
    this.speedMult    = 1;   // Derived from statAthletic
    this.jumpMult     = 1;   // Derived from statAthletic
    this.stealMult    = 1;   // Derived from statDefence
    this.shootSkill   = 0.5; // Derived from statShoot (0-1)
    this.statLabel    = '';  // Name of this round's best stat
    this.statLabelT   = 0;   // Frames remaining to show floating label above head
    this.cfg = cfg;
    // Each player targets the OPPONENT's basket
    this.tHoop  = idx===0 ? RH : LH;
    this.tRimCX = idx===0 ? RRIM_CX : LRIM_CX;
    // Visual config
    this.col1  = idx===0 ? '#2255dd' : '#dd3311';  // Jersey
    this.col2  = idx===0 ? '#1133aa' : '#aa2200';  // Shorts/accents
    this.hairC = idx===0 ? '#111122' : '#8b2200';
    this.skinC = idx===0 ? '#f5c090' : '#e8a878';
  }

  update(dt) {
    // Input now goes through the shared _isActionHeld() resolver so bot,
    // networked-remote, and solo-local-human (dual WASD+Arrow) cases are
    // all handled identically everywhere input is read in the game —
    // see the function definition above the Player class for details.
    const mv       = (_isActionHeld(this.idx,'left') ? -1 : 0) + (_isActionHeld(this.idx,'right') ? 1 : 0);
    const doJump   = _isActionHeld(this.idx,'jump') || _isActionHeld(this.idx,'jump2');
    const doAction = _isActionHeld(this.idx,'action');

    // ── Guard against auto-shoot when receiving ball while action key is held ──
    const justGotBall = this.hasBall && !this.hadBallLastFrame;
    if (justGotBall && doAction) this.requireActionRelease = true;
    if (!doAction) this.requireActionRelease = false;
    this.hadBallLastFrame = this.hasBall;

    // ── CHARGE SHOT: hold action with ball, release to fire ──
    if (this.hasBall && this.shootCD <= 0 && !this.requireActionRelease) {
      if (doAction) {
        this.chargeT = Math.min(this.maxCharge, this.chargeT + 1.7);
        this.isCharg = true;
      } else if (this.isCharg) {
        this._shoot();
        this.chargeT = 0; this.isCharg = false;
      }
    } else if (!this.hasBall || this.requireActionRelease) {
      this.chargeT = 0; this.isCharg = false;
    }

    // ── STEAL: action key when NOT holding ball ──
    if (!this.hasBall && doAction && !this.wasAction) {
      if (this.stealActCD <= 0) {
        const success = this._attemptSteal();
        this.stealActCD = success ? 900 : 280;
        // Bot gets a longer steal cooldown penalty scaled by difficulty
        // (doesn't affect visual format — counter just runs longer)
        if (gameMode === '1p' && this.idx === BOT_IDX) {
          const mult = { easy:3, medium:2, hard:1 }[botDifficulty] || 1;
          this.stealActCD *= mult;
        }
      }
    }
    this.wasAction = doAction;

    // ── MOVEMENT: locked once player touches ground while charging ──
    // Charging started mid-air: free l/r movement UNTIL landing
    // Once grounded during charge: locked even if player jumps again
    if (this.isCharg && this.grounded) this.landedWhileCharging = true;
    if (!this.isCharg) this.landedWhileCharging = false;

    if (this.landedWhileCharging) {
      this.vx *= 0.55;
    } else {
      if (mv !== 0) { this.vx = mv * P_SPD * this.speedMult; this.dir = mv; }
      else this.vx *= 0.72;
    }

    // ── JUMP: always allowed (height scaled by Athleticism) ──
    if (doJump && !this.wasJump && this.grounded) {
      this.vy = J_POW * this.jumpMult; this.grounded = false;
    }
    this.wasJump = doJump;

    // Gravity + position
    this.vy += GRAV;
    this.x  += this.vx; this.y += this.vy;
    if (this.y >= FLOOR) { this.y = FLOOR; this.vy = 0; this.grounded = true; }
    this.x = Math.max(55, Math.min(W-55, this.x));

    if (this.stealActCD > 0) this.stealActCD = Math.max(0, this.stealActCD - dt*1000);
    if (this.dunkAnimT   > 0) this.dunkAnimT--;
    if (this.statLabelT  > 0) this.statLabelT--;

    // ── Pose / animation ──
    // Show dunk arm raise as soon as player is airborne near the hoop,
    // even before they start charging — gives visual readout of dunk opportunity
    const nearHoopForDunk = this._canDunk();
    if (this.dunkAnimT > 0 && !this.hasBall) {
      this.pose = 'dunk';
    } else if (this.celebT > 0) {
      this.pose = 'celebrate'; this.celebT--;
    } else if (!this.grounded && nearHoopForDunk) {
      // In dunk zone — arms go up regardless of whether ball is held or charging
      this.pose = 'dunk';
    } else if (this.isCharg && this.hasBall) {
      this.pose = 'shoot';
    } else if (!this.grounded) {
      this.pose = 'jump';
    } else if (this.shootCD > 20) {
      this.pose = 'shoot';
    } else if (Math.abs(this.vx) > 0.5) {
      this.pose = 'run'; this.legPh += 0.2;
    } else {
      this.pose = 'idle'; this.legPh = 0;
    }
    this.poseT++;

    if (this.shootCD > 0) this.shootCD--;
    if (this.stealCD  > 0) this.stealCD--;
  }

  _canDunk() {
    // Only allow dunk when player is genuinely at rim height AND close horizontally
    // Taller players (higher heightScale) get a slightly bigger dunk window
    const rimY = this.tHoop.rimY;
    const pad  = (this.heightScale - 1) * 70;  // taller = more forgiving reach
    return !this.grounded
        && Math.abs(this.x - this.tRimCX) < 52 + pad
        && this.y < rimY + 60 + pad
        && this.y > rimY - 80 - pad;
  }

  _shoot() {
    const isDunk = this._canDunk();
    const tx = this.tRimCX, ty = this.tHoop.rimY;

    const dist = Math.abs(this.x - tx);
    BALL.shotWas3 = !isDunk && dist > 340;  // 2pt zone pushed further back

    if (isDunk) {
      // Determine dunk type from charge level:
      // Quick tap (low charge) → simple slam
      // Sweet-spot charge (60–82% of bar) → WINDMILL
      const chargePct = this.chargeT / this.maxCharge;
      this.dunkType  = (chargePct >= 0.60 && chargePct <= 0.82) ? 'windmill' : 'simple';
      this.dunkAnimT = this.dunkType === 'windmill' ? 48 : 22;

      BALL.owner      = -1;
      BALL.isDunk     = true;
      BALL.blockDelay = 28;
      BALL.x          = tx;
      BALL.y          = ty - 20;
      BALL.vx         = (Math.random()-0.5)*1.5;
      BALL.vy         = 9;
      BALL.pickupDelay= 30;
      BALL.lastShooter= this.idx;
      BALL.shotWas3   = false;

      if (this.dunkType === 'windmill') {
        SFX.dunk(); shake(38);
        burst(tx, ty-10, ['#ff8800','#ffcc44','#ffffff','#ff4400','#ffaa00'], 55, 14);
        burst(tx, ty-10, ['#ffee44','#ffffff'], 20, 8);
        addFText(tx, ty-70, 'WINDMILL! 🌀', '#ffcc00');
      } else {
        SFX.dunk(); shake(24);
        burst(tx, ty-10, ['#ff8800','#ffcc44','#ffffff','#ff4400'], 30, 9);
      }
    } else {
      // Arc shot — charge level sets arc height (64% = perfect timing)
      // Shooting stat controls consistency: lower skill = more random jitter on the arc
      const chargeFrac = Math.max(0.01, this.chargeT / this.maxCharge);
      BALL.launch(this.x + this.dir*24, this.y - 56, tx, ty, chargeFrac, this.shootSkill);
      BALL.lastShooter = this.idx;
    }

    this.hasBall  = false;
    BALL.owner    = -1;
    this.shootCD  = 45;
    this.pose     = isDunk ? 'dunk' : 'shoot';
    this.poseT    = 0;
  }

  _attemptSteal() {
    const other = PLAYERS[1-this.idx];
    if (!other.hasBall) return false;
    const dist = Math.hypot(this.x-other.x, this.y-other.y);
    // Defence stat scales how far the steal can reach
    const SURE_RANGE = 44 * this.stealMult;
    const OUTER_RANGE = 82 * this.stealMult;
    if (dist >= OUTER_RANGE) return false;

    const prob = dist <= SURE_RANGE
      ? 1.0
      : 1.0 - ((dist - SURE_RANGE) / (OUTER_RANGE - SURE_RANGE)) * 0.65;

    if (Math.random() < prob) {
      BALL.owner    = this.idx;
      BALL.vx       = this.dir * 3;
      BALL.vy       = -2.5;
      this.hasBall  = true;
      other.hasBall = false;
      this.stealCD  = 80;
      other.stealCD = 40;
      SFX.steal(); shake(6);
      return true;
    }
    return false; // Failed — caller gives a shorter retry cooldown
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    const d  = this.dir;
    const lp = this.legPh;

    // ── HEIGHT SCALE — wraps the body so taller/shorter players visibly differ ──
    ctx.save();
    ctx.scale(this.heightScale, this.heightScale);

    // Ground shadow (elongated ellipse)
    ctx.beginPath();
    ctx.ellipse(0, 4, 24, 8, 0, 0, Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.36)'; ctx.fill();

    // ── LEGS ──
    const legSwing = this.pose==='run' ? Math.sin(lp)*30
                   : this.pose==='jump' ? -24 : 0;

    // Dunk leg kick: legs angle back during dunk animation (no legDip offset — always connected)
    let dunkLegKick = 0;
    if (this.pose === 'dunk') {
      if (this.dunkAnimT > 0) {
        const total = this.dunkType === 'windmill' ? 48 : 22;
        const t = 1 - this.dunkAnimT / total;
        dunkLegKick = -18 - 22 * Math.sin(t * Math.PI); // Kick back then return
      } else {
        dunkLegKick = -14; // Pre-release: slight backward lean on legs
      }
    }

    // Left leg — always at y=-20 (bottom of jersey), no gap
    ctx.save(); ctx.translate(-9, -20); ctx.rotate((legSwing + dunkLegKick)*Math.PI/180);
    ctx.fillStyle=this.col2;
    ctx.beginPath(); ctx.roundRect(-5,0,10,26,3); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(-7,24,13,7,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(-7,24,13,3);
    ctx.restore();

    // Right leg — always at y=-20
    ctx.save(); ctx.translate(9, -20); ctx.rotate((-legSwing + dunkLegKick)*Math.PI/180);
    ctx.fillStyle=this.col2;
    ctx.beginPath(); ctx.roundRect(-5,0,10,26,3); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(-7,24,13,7,3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(-7,24,13,3);
    ctx.restore();

    // ── BODY (jersey) ──
    const bodyTilt = this.pose==='run' ? Math.sin(lp*0.5)*3*d : 0;
    ctx.save(); ctx.rotate(bodyTilt*Math.PI/180);

    ctx.fillStyle=this.col1;
    ctx.beginPath(); ctx.roundRect(-18,-68,36,48,7); ctx.fill();

    // Jersey collar / stripe
    ctx.fillStyle=this.col2; ctx.fillRect(-8,-68,16,6);

    // Number
    ctx.fillStyle='white'; ctx.font='bold 17px Arial Black';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.idx+1, 0, -46);

    // ── ARMS ──
    const armSwing = this.pose==='run' ? -Math.sin(lp)*24 : 0;
    const shootAng = this.pose==='shoot' ? -65*d : 0;
    const jumpAng  = this.pose==='jump'  ? -16 : 0;
    const celebAng = this.pose==='celebrate' ? -80 : 0;

    // Dunk arm angle: animated based on dunk type and how far through the animation we are
    let dunkAng = 0;
    if (this.pose === 'dunk') {
      if (this.dunkAnimT > 0) {
        if (this.dunkType === 'windmill') {
          // Full 360° windmill: arm sweeps back → up → forward → slam in 48 frames
          const t = 1 - this.dunkAnimT / 48;         // 0 → 1
          dunkAng = -360 * d * t;                     // One full rotation
          // Add left arm rising for counterbalance
        } else {
          // Simple slam: arm rises to overhead then punches through in 22 frames
          const t = 1 - this.dunkAnimT / 22;
          const rise = Math.sin(t * Math.PI);          // 0 → peak → 0
          dunkAng = -160 * d * rise;                   // Arm swings up then down
        }
      } else {
        // Pre-release charge stance (holding above rim)
        dunkAng = -90 * d;
      }
    }

    // Left arm (opposite swing; slight raise for windmill counterbalance)
    const windCounterL = (this.pose==='dunk' && this.dunkType==='windmill' && this.dunkAnimT>0)
      ? (1 - this.dunkAnimT/48) * 120  // Left arm rises as right arm windmills
      : 0;
    ctx.save(); ctx.translate(-18,-60);
    ctx.rotate((armSwing + jumpAng + windCounterL) * Math.PI/180);
    ctx.fillStyle=this.col1;
    ctx.beginPath(); ctx.roundRect(-5,0,10,22,4); ctx.fill();
    ctx.fillStyle=this.skinC;
    ctx.beginPath(); ctx.roundRect(-4,20,9,7,3); ctx.fill();
    ctx.restore();

    // Right arm (shooting / dunking arm)
    ctx.save(); ctx.translate(18,-60);
    ctx.rotate((-armSwing + shootAng + dunkAng + jumpAng + celebAng) * Math.PI/180);
    ctx.fillStyle=this.col1;
    ctx.beginPath(); ctx.roundRect(-5,0,10,22,4); ctx.fill();
    ctx.fillStyle=this.skinC;
    ctx.beginPath(); ctx.roundRect(-4,20,9,7,3); ctx.fill();
    ctx.restore();

    // ── HEAD ──
    const headBob = this.pose==='run' ? Math.sin(lp*2)*2 : 0;
    const hY = -85 + headBob;

    // Ear — drawn first so the head covers the inner part naturally
    ctx.beginPath();
    ctx.ellipse(-d*13, hY+3, 3.8, 5.5, 0, 0, Math.PI*2);
    ctx.fillStyle = this.skinC; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-d*13, hY+3, 1.8, 3, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();

    // Head — slightly taller oval
    ctx.beginPath();
    ctx.ellipse(0, hY, 15.5, 17.5, 0, 0, Math.PI*2);
    ctx.fillStyle = this.skinC; ctx.fill();

    // Subtle jaw shadow at the bottom of the head
    ctx.beginPath();
    ctx.ellipse(d*1.5, hY+13, 9, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fill();

    // ── HAIR ── (different style per player, drawn over head)
    ctx.fillStyle = this.hairC;
    if (this.idx === 0) {
      // P1: Short tight cap — straight clean line at the bottom
      ctx.beginPath();
      ctx.arc(0, hY, 15.5, -Math.PI*1.1, Math.PI*0.05);
      ctx.lineTo(d*6, hY+4);
      ctx.lineTo(-d*6, hY+4);
      ctx.closePath(); ctx.fill();
    } else {
      // P2: Slightly longer with a forward sweep and top volume
      ctx.beginPath();
      ctx.arc(0, hY, 15.5, -Math.PI*1.18, Math.PI*0.15);
      ctx.lineTo(d*9, hY+7);
      ctx.lineTo(-d*5, hY+4);
      ctx.closePath(); ctx.fill();
      // Volume bump at the top for height
      ctx.beginPath();
      ctx.ellipse(-d*2, hY-15, 9, 5.5, -d*0.22, 0, Math.PI*2);
      ctx.fill();
    }

    // ── EYEBROW — sits just below the hairline (hY+1), well above the eye ──
    ctx.save();
    ctx.strokeStyle = this.hairC; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(d*3.5, hY+1);
    ctx.quadraticCurveTo(d*7.5, hY-1.5, d*12, hY+1);
    ctx.stroke();
    ctx.restore();

    // ── EYE — sits at hY+6, clearly on the face below the hairline ──
    // Sclera
    ctx.beginPath();
    ctx.ellipse(d*7.5, hY+6.5, 4.8, 3.8, 0, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();

    // Pupil / iris
    ctx.beginPath();
    ctx.arc(d*8, hY+6.5, 2.8, 0, Math.PI*2);
    ctx.fillStyle = '#18181e'; ctx.fill();

    // Catchlight / glint
    ctx.beginPath();
    ctx.arc(d*8.6, hY+5.7, 1.1, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();

    // Upper eyelid crease
    ctx.save();
    ctx.strokeStyle = 'rgba(40,20,8,0.25)'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(d*7.5, hY+6.5, 4.8, -Math.PI*0.85, -Math.PI*0.08);
    ctx.stroke();
    ctx.restore();

    // ── NOSE — subtle dot at mid-face ──
    ctx.beginPath();
    ctx.arc(d*3.5, hY+10, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.11)'; ctx.fill();

    // ── MOUTH — slight smile at lower face ──
    ctx.save();
    ctx.strokeStyle = 'rgba(80,30,15,0.38)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(d*2.5, hY+13.5, 3.8, -Math.PI*0.05, Math.PI*0.45);
    ctx.stroke();
    ctx.restore();

    ctx.restore(); // body tilt

    // ── NAMEPLATE & STAT LABEL drawn inside heightScale so they track above the head ──
    // We counter-scale font sizes so the text appears at a fixed visual size regardless of height.
    const hs = this.heightScale;

    // Team label name plate — anchored above the head at -105 in player-scale space
    ctx.fillStyle = this.col1; ctx.globalAlpha=0.9;
    ctx.beginPath(); ctx.roundRect(-18,-105,36,14,4); ctx.fill();
    ctx.globalAlpha=1; ctx.fillStyle='white';
    ctx.font=`bold ${Math.round(9/hs)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`P${this.idx+1}`, 0,-98);

    // ── BEST-STAT FLOATING LABEL — briefly shown when round goes live ──
    if (this.statLabelT > 0) {
      const tt = this.statLabelT / 140;
      ctx.save();
      ctx.globalAlpha = Math.min(1, tt*2.2);
      const bob = Math.sin((140 - this.statLabelT) * 0.16) * 3;
      const accentCol = this.idx===0 ? '#7ec8ff' : '#ff9d80';
      ctx.font = `bold ${Math.round(16/hs)}px Arial Black`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = accentCol; ctx.shadowBlur = 12/hs;
      ctx.fillStyle = accentCol;
      ctx.fillText(`${this.statLabel}!`, 0, -158 + bob);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    ctx.restore(); // end heightScale transform — UI overlays (power bar, steal CD) stay normal size

    // Ball possession glow (world coords, always same size)
    if (this.hasBall) {
      const rg = ctx.createRadialGradient(d*28,-52,2, d*28,-52,24);
      rg.addColorStop(0,'rgba(255,180,0,0.28)');
      rg.addColorStop(1,'rgba(255,180,0,0)');
      ctx.beginPath(); ctx.arc(d*28,-52,24,0,Math.PI*2);
      ctx.fillStyle=rg; ctx.fill();
    }

    // ── CHARGE POWER METER — dynamic sweet-zone colour ──────────────
    if (this.isCharg && this.hasBall) {
      const pct = this.chargeT / this.maxCharge;
      const bw=56, bh=9;
      const bx=-bw/2, by=-125;

      // Compute where the ball will land at the rim x for this exact charge
      const hsx = this.x + this.dir*24, hsy = this.y - 56;
      const htx = this.tRimCX, hty = this.tHoop.rimY;
      const hdx = htx - hsx;
      const hT  = Math.max(18, Math.abs(hdx)/14);
      const hgm     = roundBallType==='heavy' ? 1.55 : roundBallType==='bouncy' ? 0.75 : 1.0;
      const hPerfVy = (hty - hsy - 0.5*GRAV*hgm*hT*hT)/hT;
      const hVyF = 0.20 + pct*1.25;
      const hVy0 = hPerfVy * hVyF;
      const yAtT  = hsy + hVy0*hT + 0.5*GRAV*hgm*hT*hT;
      const descAtT = hVy0 + GRAV*hT > 0;     // ball descending at rim?
      const ymiss   = Math.abs(yAtT - hty);
      const inZone  = descAtT && ymiss < 22;   // within ±22px of rim while going down
      const maxPow  = pct >= 0.94;

      // Zone-colour:  green = too short │ gold = sweet spot │ orange = too high │ red = max
      const barCol = maxPow    ? '#ff3333'
                   : inZone    ? '#ffdd00'
                   : !descAtT || yAtT < hty - 22 ? '#ff8833'   // over
                   : '#44ffaa';                                  // short

      // Background track
      ctx.fillStyle='rgba(0,0,0,0.8)';
      ctx.beginPath(); ctx.roundRect(bx-1,by-1,bw+2,bh+2,3); ctx.fill();

      // Zone label (replaces static "POWER")
      const label = maxPow ? 'TOO HIGH!' : inZone ? 'SWEET SPOT' : !descAtT||yAtT<hty-22 ? 'TOO HIGH' : 'TOO LOW';
      ctx.font='bold 8px Arial Black'; ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillStyle = inZone ? '#ffdd00' : maxPow ? '#ff5555' : 'rgba(255,255,255,0.6)';
      ctx.fillText(label, 0, by-3);

      // Filled bar
      ctx.fillStyle = barCol;
      ctx.beginPath(); ctx.roundRect(bx, by, bw*pct, bh, 2); ctx.fill();

      // Sweet-spot tick line at 64% (the perfect timing point)
      const ssX = bx + bw*0.64;
      ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(ssX, by-2); ctx.lineTo(ssX, by+bh+2); ctx.stroke();

      // Pulsing glow at max charge
      if (maxPow) {
        const pulse = Math.sin(Date.now()/60)*0.5+0.5;
        ctx.save();
        ctx.shadowColor='#ff3333'; ctx.shadowBlur=16;
        ctx.strokeStyle=`rgba(255,60,60,${0.5+pulse*0.5})`; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.roundRect(bx-1,by-1,bw+2,bh+2,3); ctx.stroke();
        ctx.shadowBlur=0; ctx.restore();
      }
    }

    // ── STEAL COOLDOWN: one-decimal countdown (1.0 → 0.9 → 0.0) ──
    if (this.stealActCD > 0) {
      const sec = (this.stealActCD / 1000).toFixed(1);
      const cdY = -140;
      ctx.fillStyle='rgba(0,0,0,0.82)';
      ctx.beginPath(); ctx.roundRect(-22,cdY-2,44,18,5); ctx.fill();
      ctx.strokeStyle= this.stealActCD>500 ? '#ff4444' : '#ffaa44';
      ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.roundRect(-22,cdY-2,44,18,5); ctx.stroke();
      ctx.font='bold 12px monospace';
      ctx.fillStyle= this.stealActCD>500 ? '#ff6666' : '#ffcc88';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(sec, 0, cdY+7);
      ctx.font='bold 7px Arial';
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillText('STEAL', 0, cdY-8);
    }

    ctx.restore(); // end player transform

    // ── TRAJECTORY PREVIEW — draw dotted arc in world coordinates ──
    if (this.isCharg && this.hasBall) this._drawTrajectory();
  }

  // Draw trajectory preview arc (called in world/screen coordinates after draw())
  _drawTrajectory() {
    const cf  = this.chargeT / this.maxCharge;
    const sx  = this.x + this.dir * 24;
    const sy  = this.y - 56;
    const tx  = this.tRimCX, ty = this.tHoop.rimY;
    const dx  = tx - sx;
    const T   = Math.max(18, Math.abs(dx) / 14);
    const vx  = dx / T;
    const gm  = roundBallType==='heavy' ? 1.55 : roundBallType==='bouncy' ? 0.75 : 1.0;
    const pVy = (ty - sy - 0.5 * GRAV * gm * T * T) / T;
    const vy0 = pVy * (0.20 + cf * 1.25);

    ctx.save();
    for (let t = 3; t <= 100; t += 3) {
      const bx = sx + vx * t;
      const by = sy + vy0 * t + 0.5 * GRAV * gm * t * t;
      if (by >= FLOOR - 5 || bx < 10 || bx > W - 10) break;

      const alpha = Math.max(0, 0.55 - t / 100 * 0.45);
      const rad   = Math.max(1, 3 - t / 100 * 2);

      // Green dot when near the rim scoring zone, yellow otherwise
      const nearRimX = Math.abs(bx - tx) < RIM_W / 2;
      const nearRimY = Math.abs(by - ty) < 22;
      const descending = vy0 + GRAV * t > 0;
      const onTarget = nearRimX && nearRimY && descending;

      ctx.beginPath();
      ctx.arc(bx, by, rad, 0, Math.PI * 2);
      ctx.fillStyle = onTarget
        ? `rgba(80,255,130,${alpha + 0.25})`
        : `rgba(255,210,55,${alpha})`;
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── GLOBAL PLAYER ARRAY ──────────────────────────────────────────
// S (P1) / ↓ (P2) = action key: SHOOT when holding ball, STEAL when not
const P1 = new Player(0, W*0.28, {
  left:'KeyA', right:'KeyD', jump:'KeyW', jump2:'Space', action:'KeyS'
});
const P2 = new Player(1, W*0.72, {
  left:'ArrowLeft', right:'ArrowRight', jump:'ArrowUp', jump2:'ShiftRight', action:'ArrowDown'
});
const PLAYERS = [P1, P2];

// ── CROWD HYPE ────────────────────────────────────────────────────
let crowdHype = 0; // 0–1, spikes on score

// ── ARENA BACKGROUND ─────────────────────────────────────────────
function drawArena() {
  // ── SKY — changes each round based on roundTime ───────────────
  const skyH = FLOOR - 10;
  const bg = ctx.createLinearGradient(0, 0, 0, skyH);
  let sunMoon = null;  // {x,y,r,col,glow} or null

  if (roundTime === 'day') {
    bg.addColorStop(0, '#1a78c2');
    bg.addColorStop(0.5, '#3aa0e8');
    bg.addColorStop(1, '#7dcfff');
    sunMoon = { x:W*0.78, y:62, r:38, col:'#fff9a0', glow:'rgba(255,250,160,0.22)' };
    // Soft white clouds
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,skyH);
    ctx.fillStyle='rgba(255,255,255,0.25)';
    [[160,48,80,24],[340,72,55,18],[820,38,90,26],[1050,60,65,20]].forEach(([cx,cy,rw,rh])=>{
      ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx-22,cy+8,rw*0.55,rh*0.7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+24,cy+6,rw*0.6,rh*0.65,0,0,Math.PI*2); ctx.fill();
    });
  } else if (roundTime === 'sunrise') {
    bg.addColorStop(0, '#1a1a4e');
    bg.addColorStop(0.35, '#6b3080');
    bg.addColorStop(0.65, '#e86030');
    bg.addColorStop(1, '#f5b042');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,skyH);
    sunMoon = { x:W*0.22, y:skyH*0.42, r:34, col:'#ffcc44', glow:'rgba(255,180,60,0.30)' };
    // Horizon glow band — only in the bottom portion of sky
    const hg=ctx.createLinearGradient(0,skyH*0.55,0,skyH);
    hg.addColorStop(0,'rgba(255,120,30,0)'); hg.addColorStop(1,'rgba(255,120,30,0.18)');
    ctx.fillStyle=hg; ctx.fillRect(0,skyH*0.55,W,skyH*0.45);
  } else if (roundTime === 'sunset') {
    bg.addColorStop(0, '#0a0a20');
    bg.addColorStop(0.3, '#3a1a5a');
    bg.addColorStop(0.6, '#c0401a');
    bg.addColorStop(1, '#e8901a');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,skyH);
    sunMoon = { x:W*0.78, y:skyH*0.40, r:40, col:'#ff9940', glow:'rgba(255,120,20,0.32)' };
    const hg=ctx.createLinearGradient(0,skyH*0.58,0,skyH);
    hg.addColorStop(0,'rgba(220,80,10,0)'); hg.addColorStop(1,'rgba(220,80,10,0.20)');
    ctx.fillStyle=hg; ctx.fillRect(0,skyH*0.58,W,skyH*0.42);
  } else {
    // Night (default)
    bg.addColorStop(0,'#060a18');
    bg.addColorStop(0.5,'#0d1628');
    bg.addColorStop(1,'#141e35');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,skyH);
    // Stars
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for (let s=0;s<60;s++) {
      const sx=(s*137.5+17)%W, sy=(s*83.1+31)%(skyH*0.75);
      const sr=s%5===0?1.3:0.7;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
    }
    sunMoon = { x:W*0.82, y:50, r:22, col:'rgba(230,230,255,0.95)', glow:'rgba(200,210,255,0.18)' };
    // Moon crescent shadow
    if (sunMoon) {
      const m=sunMoon;
      ctx.beginPath(); ctx.arc(m.x,m.y,m.r*2.6,0,Math.PI*2);
      ctx.fillStyle=m.glow; ctx.fill();
      ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
      ctx.fillStyle=m.col; ctx.fill();
      ctx.beginPath(); ctx.arc(m.x-8,m.y-4,m.r*0.82,0,Math.PI*2);
      ctx.fillStyle='#10182a'; ctx.fill(); // crescent bite
      sunMoon = null; // already drawn
    }
  }

  // Draw sun (for day/sunrise/sunset)
  if (sunMoon) {
    const m = sunMoon;
    const glowR = ctx.createRadialGradient(m.x,m.y,m.r*0.5,m.x,m.y,m.r*3);
    glowR.addColorStop(0,m.glow); glowR.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glowR; ctx.beginPath(); ctx.arc(m.x,m.y,m.r*3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
    ctx.fillStyle=m.col; ctx.fill();
  }

  // Stadium flood lights (tinted by time-of-day)
  const lightTint = roundTime==='day' ? 'rgba(255,255,230,0.07)'
                  : roundTime==='sunrise'||roundTime==='sunset' ? 'rgba(255,200,100,0.10)'
                  : 'rgba(255,245,210,0.14)';
  const lxs=[140,360,W/2,W-360,W-140];
  for (const lx of lxs) {
    const cone=ctx.createRadialGradient(lx,-15,0,lx,-15,290);
    cone.addColorStop(0,lightTint); cone.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cone;
    ctx.beginPath(); ctx.moveTo(lx,-15); ctx.lineTo(lx-135,FLOOR-10); ctx.lineTo(lx+135,FLOOR-10); ctx.closePath(); ctx.fill();
    if (roundTime!=='day') {
      ctx.beginPath(); ctx.arc(lx,5,6,0,Math.PI*2); ctx.fillStyle='rgba(255,245,200,0.8)'; ctx.fill();
      ctx.beginPath(); ctx.arc(lx,5,9,0,Math.PI*2); ctx.fillStyle='rgba(255,245,200,0.15)'; ctx.fill();
    }
  }

  // ── CROWD ────────────────────────────────────────────────────────
  for (let row = 0; row < 4; row++) {
    const ry  = FLOOR - 195 - row * 52;
    const sp  = Math.round(22 - row * 1.5);
    const off = (row & 1) * 12;
    const cnt = Math.ceil(W / sp) + 2;
    const bd  = roundTime==='day' ? 26+row*8 : 6 + row * 6;

    const tg = ctx.createLinearGradient(0, ry, 0, ry + 52);
    tg.addColorStop(0, `rgb(${bd+3},${bd+3},${bd+9})`);
    tg.addColorStop(1, `rgb(${bd},${bd},${bd+6})`);
    ctx.fillStyle = tg; ctx.fillRect(0, ry, W, 52);

    for (let i = 0; i < cnt; i++) {
      const fx   = i * sp + off - sp;
      const seed = (i * 13 + row * 37) & 0xfff;
      const hue  = (seed * 29) % 360;
      const ht   = 28 + (seed % 12);
      const hR   = 7  + (seed % 3);
      const lS   = bd + 5 + (seed % 8);
      const lSk  = bd + 14;

      ctx.fillStyle = `hsl(${hue},28%,${lS}%)`;
      ctx.beginPath(); ctx.roundRect(fx-7, ry+52-ht, 14, ht, 2); ctx.fill();
      ctx.fillStyle = `hsl(${(hue+20)%360},10%,${lSk}%)`;
      ctx.beginPath(); ctx.ellipse(fx, ry+52-ht-hR+2, hR*0.85, hR, 0, 0, Math.PI*2); ctx.fill();

      if (crowdHype > 0.35 && (seed % 4) === 0) {
        ctx.strokeStyle = `hsl(${hue},28%,${lS}%)`;
        ctx.lineWidth = 3.5; ctx.lineCap = 'round';
        const aY = ry + 52 - ht + 7;
        ctx.beginPath(); ctx.moveTo(fx-7, aY); ctx.lineTo(fx-17, aY-12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(fx+7, aY); ctx.lineTo(fx+17, aY-12); ctx.stroke();
      }
    }
  }
}

// ── COURT ─────────────────────────────────────────────────────────
function drawCourt() {
  // ── HARDWOOD FLOOR ─────────────────────────────────────────────
  const fg=ctx.createLinearGradient(0,FLOOR-12,0,H);
  fg.addColorStop(0, '#d88840');
  fg.addColorStop(0.04,'#c67830');
  fg.addColorStop(0.4, '#a86026');
  fg.addColorStop(1,  '#7c4015');
  ctx.fillStyle=fg; ctx.fillRect(0,FLOOR-12,W,H-FLOOR+12);

  // Key / paint zones — tinted floor sections (ON the floor, not above it)
  ctx.fillStyle='rgba(30,65,190,0.18)';
  ctx.fillRect(58,FLOOR-12,196,H-FLOOR+12);       // Left key zone
  ctx.fillStyle='rgba(190,45,20,0.15)';
  ctx.fillRect(W-58-196,FLOOR-12,196,H-FLOOR+12); // Right key zone

  // Plank lines (subtle horizontal grain in the floor)
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
  for (let i=0;i<20;i++) {
    const py=FLOOR-12+i*7; if(py>H)break;
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
  }

  // Floor shine streak
  const shine=ctx.createLinearGradient(80,FLOOR-12,W*0.65,FLOOR-12);
  shine.addColorStop(0,'rgba(255,200,120,0)');
  shine.addColorStop(0.35,'rgba(255,200,120,0.06)');
  shine.addColorStop(1,'rgba(255,200,120,0)');
  ctx.fillStyle=shine; ctx.fillRect(0,FLOOR-12,W,50);

  // Floor edge highlight line (top of hardwood)
  ctx.strokeStyle='#e09040'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,FLOOR-12); ctx.lineTo(W,FLOOR-12); ctx.stroke();

  // ── COURT LINES (all at or below floor surface — no floating lines) ──
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.70)'; ctx.lineWidth=2;

  // Baseline / sidelines (floor-level rectangle)
  ctx.strokeRect(58,FLOOR-13,W-116,16);

  // Center dividing line (vertical, from floor downward)
  ctx.beginPath(); ctx.moveTo(W/2,FLOOR-13); ctx.lineTo(W/2,H); ctx.stroke();

  // Key boundary lines (right edge of left key / left edge of right key)
  ctx.beginPath(); ctx.moveTo(58+196,FLOOR-13); ctx.lineTo(58+196,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-58-196,FLOOR-13); ctx.lineTo(W-58-196,H); ctx.stroke();

  // Free-throw line (short horizontal marks at top of key, at floor level)
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(58,FLOOR-13); ctx.lineTo(58+196,FLOOR-13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-58,FLOOR-13); ctx.lineTo(W-58-196,FLOOR-13); ctx.stroke();

  // 3-point distance markers — vertical dashed lines on the floor/below
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(265,FLOOR-13); ctx.lineTo(265,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-265,FLOOR-13); ctx.lineTo(W-265,H); ctx.stroke();
  ctx.setLineDash([]);

  // 2pt distance label
  ctx.font='bold 10px Arial Black';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('2PT',265,FLOOR-10);
  ctx.fillText('2PT',W-265,FLOOR-10);

  // Center circle arc (ON the floor surface — just the top half at floor level)
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2,FLOOR-13,65,0,Math.PI); ctx.stroke();

  // Court branding watermark (ON the floor)
  ctx.font='bold 30px Arial Black';
  ctx.fillStyle='rgba(255,255,255,0.055)';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('HOOPFIRE', W/2, FLOOR+52);

  ctx.restore();
}

// ── HOOP ─────────────────────────────────────────────────────────
function drawHoop(h, isLeft) {
  const rCX = (h.rimX + h.rimRX) / 2;
  const rW  = h.rimRX - h.rimX;
  const pX  = h.pole;        // pole center x
  const bbX = h.bx;          // backboard left edge
  const bbW = h.bx2 - h.bx; // backboard width (16px)
  const bbH = h.by2 - h.by1; // backboard height

  ctx.save();
  ctx.lineCap = 'round';

  // ── 1. BASE PLATE — grounds the pole to the floor ─────────────────
  ctx.fillStyle = '#3c3c4c';
  ctx.beginPath();
  ctx.roundRect(pX - 16, FLOOR - 14, 32, 18, 4);
  ctx.fill();
  ctx.strokeStyle = '#606072'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(pX - 16, FLOOR - 14, 32, 18, 4);
  ctx.stroke();

  // ── 2. MAIN POLE — floor all the way up to top of backboard ───────
  // (Previously stopped at by2+22 = 347, leaving backboard top floating)
  const poleGrad = ctx.createLinearGradient(pX - 7, 0, pX + 7, 0);
  poleGrad.addColorStop(0,    '#1e1e28');
  poleGrad.addColorStop(0.35, '#585868');
  poleGrad.addColorStop(0.65, '#484858');
  poleGrad.addColorStop(1,    '#1e1e28');
  ctx.strokeStyle = poleGrad;
  ctx.lineWidth   = 13;
  ctx.lineCap     = 'butt';
  ctx.beginPath();
  ctx.moveTo(pX, FLOOR - 10);
  ctx.lineTo(pX, h.by1 + 4);   // pole reaches the very top of the backboard
  ctx.stroke();

  // Pole cap at the top
  ctx.fillStyle = '#585868';
  ctx.beginPath();
  ctx.arc(pX, h.by1 + 4, 7.5, 0, Math.PI * 2);
  ctx.fill();

  // ── 3. BOOM ARMS — two horizontal brackets connecting pole to backboard
  // These are now long enough to be clearly visible
  const armEdge = isLeft ? h.bx2 : h.bx; // which edge of backboard they connect to
  ctx.strokeStyle = '#505062'; ctx.lineWidth = 8; ctx.lineCap = 'round';

  // Top arm (at about 1/4 down from top of backboard)
  const topArmY = h.by1 + 30;
  ctx.beginPath(); ctx.moveTo(pX, topArmY); ctx.lineTo(armEdge, topArmY); ctx.stroke();

  // Lower arm (at about 3/4 down)
  const botArmY = h.by1 + 90;
  ctx.beginPath(); ctx.moveTo(pX, botArmY); ctx.lineTo(armEdge, botArmY); ctx.stroke();

  // Diagonal brace from pole mid-point to bottom of backboard for rigidity look
  ctx.strokeStyle = '#424252'; ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(pX, botArmY);
  ctx.lineTo(armEdge, h.by2 - 10);
  ctx.stroke();

  // ── 4. BACKBOARD ─────────────────────────────────────────────────
  // Drop shadow for depth
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(bbX + (isLeft ? 3 : -3), h.by1 + 4, bbW, bbH);

  // Glass panel — gradient gives a subtle 3-D feel
  const bbG = ctx.createLinearGradient(bbX, 0, bbX + bbW, 0);
  if (isLeft) {
    bbG.addColorStop(0, 'rgba(180,215,255,0.78)');
    bbG.addColorStop(1, 'rgba(215,238,255,0.96)');
  } else {
    bbG.addColorStop(0, 'rgba(215,238,255,0.96)');
    bbG.addColorStop(1, 'rgba(180,215,255,0.78)');
  }
  ctx.fillStyle = bbG;
  ctx.fillRect(bbX, h.by1, bbW, bbH);

  // Glass inner shine streak
  const shineX = isLeft ? bbX + 3 : bbX + bbW - 6;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(shineX, h.by1 + 6, 3, bbH * 0.55);

  // Backboard border
  ctx.strokeStyle = 'rgba(100,165,255,0.85)'; ctx.lineWidth = 2;
  ctx.strokeRect(bbX, h.by1, bbW, bbH);

  // Red shooting target box — centred around rimY
  ctx.strokeStyle = '#ee2222'; ctx.lineWidth = 2.5;
  ctx.strokeRect(bbX, h.rimY - 38, bbW, 36);

  // ── 5. RIM SUPPORT BRACKET ────────────────────────────────────────
  // Thicker arm from backboard face to rim, with a small vertical drop
  const bracketFaceX = isLeft ? h.bx2 : h.bx;
  const rimNearX     = isLeft ? h.rimX : h.rimRX;

  ctx.strokeStyle = '#5a5a72'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bracketFaceX, h.rimY);
  ctx.lineTo(rimNearX,     h.rimY);
  ctx.stroke();

  // Small vertical drop at the attachment point to the backboard
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(bracketFaceX, h.rimY - 12);
  ctx.lineTo(bracketFaceX, h.rimY + 5);
  ctx.stroke();

  // ── 6. NET ────────────────────────────────────────────────────────
  const netBot = h.rimY + 46;
  ctx.lineCap = 'butt';

  // Vertical strands — bezier so they billow inward slightly
  ctx.strokeStyle = 'rgba(235,235,235,0.55)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const nx  = h.rimX + (rW / 8) * i;
    const ex  = rCX + (nx - rCX) * 0.25;  // converge toward center
    ctx.beginPath();
    ctx.moveTo(nx, h.rimY + 5);
    ctx.bezierCurveTo(nx, h.rimY + 18, ex, h.rimY + 32, ex, netBot);
    ctx.stroke();
  }

  // Horizontal rings — progressively narrower toward the bottom
  ctx.strokeStyle = 'rgba(235,235,235,0.48)'; ctx.lineWidth = 1;
  for (let j = 1; j <= 5; j++) {
    const ny = h.rimY + 5 + j * 7.5;
    const s  = 1 - j * 0.13;
    ctx.beginPath();
    ctx.moveTo(rCX - rW * 0.5 * s, ny);
    ctx.lineTo(rCX + rW * 0.5 * s, ny);
    ctx.stroke();
  }

  // ── 7. RIM ────────────────────────────────────────────────────────
  // End-cap circles at each post so the rim looks 3D
  ctx.fillStyle = '#cc4400';
  ctx.beginPath(); ctx.arc(h.rimX,  h.rimY, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(h.rimRX, h.rimY, 5.5, 0, Math.PI * 2); ctx.fill();

  // Main rim bar — orange glow makes it pop against the court
  ctx.shadowColor = '#ff5500'; ctx.shadowBlur = 14;
  ctx.strokeStyle = '#ff4700'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(h.rimX, h.rimY);
  ctx.lineTo(h.rimRX, h.rimY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Rim highlight stripe (top edge catches light)
  ctx.strokeStyle = 'rgba(255,170,80,0.7)'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(h.rimX + 6, h.rimY - 2);
  ctx.lineTo(h.rimRX - 6, h.rimY - 2);
  ctx.stroke();

  ctx.restore();
}

// ── ROUND STATS PANEL (compact corner badge) ────────────────────
function drawStatsPanel(p, side) {
  const pw=128, ph=82;
  const x = side==='left' ? 10 : W-10-pw;
  const y = 68;
  const col = p.idx===0 ? '#3399ff' : '#ff4422';

  ctx.fillStyle='rgba(5,8,22,0.80)';
  ctx.beginPath(); ctx.roundRect(x,y,pw,ph,8); ctx.fill();

  ctx.fillStyle=col+'99';
  ctx.beginPath();
  if (side==='left') ctx.roundRect(x,y,3,ph,[8,0,0,8]);
  else               ctx.roundRect(x+pw-3,y,3,ph,[0,8,8,0]);
  ctx.fill();

  ctx.font='bold 9px Arial Black'; ctx.fillStyle=col;
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(`P${p.idx+1}`, x+10, y+13);

  const rows=[['SHT',p.statShoot],['HGT',p.statHeight],['ATH',p.statAthletic],['DEF',p.statDefence]];
  let ry=y+22;
  for(const [lbl,val] of rows){
    ctx.font='8px monospace'; ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillText(lbl,x+10,ry+6);
    const bx=x+40, bw=78, bh=5;
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(bx,ry,bw,bh,2); ctx.fill();
    const fillCol=val>=72?'#44ff88':val>=40?col:'#ff5555';
    ctx.fillStyle=fillCol;
    ctx.beginPath(); ctx.roundRect(bx,ry,bw*(val/100),bh,2); ctx.fill();
    ry+=15;
  }
}

// Helper: draw a keyboard key badge
function drawKey(kx, ky, label, w=30) {
  const kh = 22;
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.beginPath(); ctx.roundRect(kx-w/2, ky-kh/2, w, kh, 4); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.32)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(kx-w/2, ky-kh/2, w, kh, 4); ctx.stroke();
  // Bottom shadow line (key 3-D bevel)
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(kx-w/2+4, ky+kh/2-1);
  ctx.lineTo(kx+w/2-4, ky+kh/2-1);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.font = `bold 10px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, kx, ky);
}

// Helper: draw a control row  [key] [key]  label
function drawCtrlRow(x, y, keys, label, col) {
  let kx = x;
  for (const k of keys) {
    const kw = k.length > 2 ? k.length * 7 + 14 : 30;
    drawKey(kx + kw/2, y, k, kw);
    kx += kw + 6;
  }
  ctx.fillStyle = col;
  ctx.font = '13px Arial';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, kx + 4, y);
}

// Helper: draw a player control card
function drawPlayerCard(cx, cy, cw, ch, playerIdx, now) {
  const col  = playerIdx === 0 ? '#3399ff' : '#ff4422';
  const name = playerIdx === 0 ? 'PLAYER 1' : 'PLAYER 2';

  // Card background
  ctx.fillStyle = 'rgba(8,12,28,0.92)';
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 14); ctx.fill();

  // Coloured top accent bar
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, 5, [14,14,0,0]); ctx.fill();

  // Card border
  ctx.strokeStyle = `${col}44`; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 14); ctx.stroke();

  // Player name header
  ctx.fillStyle = col;
  ctx.font = 'bold 18px Arial Black';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(name, cx + cw/2, cy + 34);

  // Control rows
  const rowX  = cx + 22;
  const labelCol = 'rgba(255,255,255,0.75)';
  let   rowY  = cy + 62;
  const gap   = 34;

  if (playerIdx === 0) {
    drawCtrlRow(rowX, rowY, ['A','D'], 'Move',                labelCol); rowY += gap;
    drawCtrlRow(rowX, rowY, ['W'],     'Jump',                labelCol); rowY += gap;
    drawCtrlRow(rowX, rowY, ['S'],     'Shoot (hold) / Steal',labelCol);
  } else {
    drawCtrlRow(rowX, rowY, ['←','→'],'Move',                labelCol); rowY += gap;
    drawCtrlRow(rowX, rowY, ['↑'],     'Jump',                labelCol); rowY += gap;
    drawCtrlRow(rowX, rowY, ['↓'],     'Shoot (hold) / Steal',labelCol);
  }

  // Tip text at bottom of card
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('Hold to charge shot · tap to steal', cx + cw/2, cy + ch - 14);
}

// ── Shared menu helper: draw a glowing button, return true if clicked ──
function _menuBtn(cx, cy, w, h, label, sub, accentCol, active, now, pulse=true) {
  const onHover = menuMouseX>cx-w/2 && menuMouseX<cx+w/2 &&
                  menuMouseY>cy-h/2 && menuMouseY<cy+h/2;
  const glow    = active || onHover;
  const alpha   = pulse ? (glow ? 1 : 0.80 + Math.sin(now/380)*0.20) : 1;

  ctx.save(); ctx.globalAlpha = alpha;

  // Background
  ctx.fillStyle = glow ? `${accentCol}28` : 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h/2, w, h, 12); ctx.fill();

  // Border — glowing when active/hover
  if (glow) { ctx.shadowColor=accentCol; ctx.shadowBlur=18; }
  ctx.strokeStyle = glow ? accentCol : 'rgba(255,255,255,0.14)';
  ctx.lineWidth   = glow ? 2 : 1;
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h/2, w, h, 12); ctx.stroke();
  ctx.shadowBlur  = 0;

  // Label
  ctx.fillStyle = glow ? accentCol : 'rgba(255,255,255,0.75)';
  ctx.font = `bold ${sub?'20':'22'}px Arial Black`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, cx, sub ? cy-8 : cy);

  // Sub-label
  if (sub) {
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '13px Arial';
    ctx.fillText(sub, cx, cy+14);
  }

  ctx.restore();

  // Click detection (returns true once on click frame)
  return menuClicked && menuMouseX>cx-w/2 && menuMouseX<cx+w/2 &&
         menuMouseY>cy-h/2 && menuMouseY<cy+h/2;
}

                 menuMouseY>backY && menuMouseY<backY+backH;

      if(sel){ctx.shadowColor=d.col;ctx.shadowBlur=10;}
      ctx.strokeStyle=sel?d.col:hov?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.10)';
      ctx.lineWidth=sel?2:1;
      ctx.beginPath(); ctx.roundRect(bx,by,dw,dh,8); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle=sel?d.col:'rgba(255,255,255,0.65)';

      ctx.fillText(d.label, bx+dw/2, by+dh/2-6);

  else if (e.key === 'Enter') { e.preventDefault(); _tryJoinRoom(); }
  else if (/^[a-zA-Z0-9]$/.test(e.key) && onlineJoinInput.length < 5) {
    onlineJoinInput += e.key.toUpperCase();
  }
});

// ── Daily spin limit (10/day, tracked per-browser via localStorage) ──
const SPIN_LS_KEY = 'hoopfire_spins_v1';
function _todayStr() { return new Date().toISOString().slice(0,10); }

function getSpinState() {
  let s;
  try { s = JSON.parse(localStorage.getItem(SPIN_LS_KEY) || '{}'); } catch(e) { s = {}; }
  if (s.date !== _todayStr()) s = { date:_todayStr(), used:0 };
  return s;
}
function getSpinsRemaining() { return Math.max(0, 10 - getSpinState().used); }
function _consumeSpin() {
  const s = getSpinState();
  s.used++;
  try { localStorage.setItem(SPIN_LS_KEY, JSON.stringify(s)); } catch(e){}
}

function _generateBaseUsername() {
  const w1 = NAME_WORD1[Math.floor(Math.random()*NAME_WORD1.length)];
  const w2 = NAME_WORD2[Math.floor(Math.random()*NAME_WORD2.length)];
  return w1 + w2;
}

// Finds the first available variant of `base` — the bare name if free,
// otherwise base+1, base+2, base+3... (e.g. "AmazingDunker3")
// Checks availability against OTHER players only (.neq client_id) — your
// own current row is never counted as "holding" a name during this
// check, since saveMyName() below overwrites your single row anyway,
// meaning whatever name you had before is freed the instant you spin.
async function _findAvailableName(base) {
  for (let suffix = 0; suffix < 200; suffix++) {
    const candidate = suffix === 0 ? base : base + suffix;
    try {
      const { data } = await sbClient.from('players').select('client_id')
        .eq('name', candidate).neq('client_id', myClientId).maybeSingle();
      if (!data) return candidate; // nobody else has this exact name — it's free
    } catch(e) {
      return candidate; // offline/error — just use it, best effort
    }
  }
  return base + Date.now(); // astronomically unlikely fallback
}

async function spinForNewName() {
  if (_spinBusy) return;
  if (getSpinsRemaining() <= 0) { _spinResultMsg = 'No spins left today — come back tomorrow!'; return; }
  _spinBusy = true;
  _spinResultMsg = 'Spinning...';
  try {
    const base = _generateBaseUsername();
    const finalName = await _findAvailableName(base);
    await saveMyName(finalName);
    _consumeSpin();
    _spinResultMsg = `You are now: ${finalName}`;
    fetchLeaderboard();
  } catch(e) {
    _spinResultMsg = 'Could not generate a name — check your connection';
  }
  _spinBusy = false;
}

async function _tryJoinRoom() {
  if (onlineJoinInput.length < 5) { onlineJoinError='Enter a 5-character code'; return; }
  onlineJoinError = 'Connecting...';
  const res = await netJoinRoom(onlineJoinInput);
  if (!res.ok) {
    onlineJoinError = res.reason==='not_found' ? 'Room not found'
                    : res.reason==='full'      ? 'Room is full'
                    : res.reason==='own_room'  ? "That's your own room"
                    : 'Could not join';
    return;
  }
  onlineRoomCode = res.code;
  onlineIsHost   = false;
  onlineIsQueueMatch = false;
  onlineLobbySettings = _roomCache ? _roomCache.settings : null;
  onlineJoinError = '';
  menuScreen = 'online_lobby';
}

function _launchOnlineGame(settings) {
  WIN_PTS = Math.max(1, Math.min(99, settings.winScore||5));
  onlineSettings = settings;
  onlineActive = true;
  gameMode = '2p';
  _lastMirroredScore = [0,0];
  _eloAppliedThisMatch = false;

  // Snapshot both ratings AT THE START of the match so mid-match writes
  // elsewhere can't skew this match's calculation, and so host/guest
  // (who each only know their OWN current rating for certain) both
  // agree on the same two numbers when computing the result afterward.
  const room = _roomCache;
  if (room) {
    onlineMyMatchElo  = onlineIsHost ? (room.hostElo||0)  : (room.guestElo||0);
    onlineOppMatchElo = onlineIsHost ? (room.guestElo||0) : (room.hostElo||0);
  }

  if (onlineIsHost) {
    // Host runs the real, authoritative simulation — identical to local
    // 2-player mode except P2's input is read over the network (see the
    // key-source branch in Player.update()).
    initAC(); initGame();
  } else {
    // Guest never simulates. It sits on a neutral screen until the
    // host's first state_snapshot broadcast arrives and overwrites
    // STATE/P1/P2/BALL — at which point render() draws it normally.
    initAC();
    STATE = 'jumpball';
    SCORE[0]=0; SCORE[1]=0; WINNER=-1;
  }
}

function _drawStepper(x, y, numW, h, stepW, value, min, max, editable, onChange) {

  ctx.beginPath(); ctx.roundRect(x,y,stepW,h,6); ctx.fill();
  ctx.fillStyle = editable ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
  ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.fillRect(x+stepW+4, y, numW, h);
  ctx.fillStyle='#ffcc33'; ctx.font='bold 16px Arial Black';
  ctx.fillText(value, x+stepW+4+numW/2, y+h/2);

  const x2 = x+stepW+4+numW+4;
  ctx.fillStyle = editable ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
  ctx.beginPath(); ctx.roundRect(x2,y,stepW,h,6); ctx.fill();

    if (menuMouseX>x2&&menuMouseX<x2+stepW&&menuMouseY>y&&menuMouseY<y+h) onChange(Math.min(max,value+1));

// ── SCORE FLASH ────────────────────────────────────────────────────
let scoreFlashT = 0;
let scoreFlashText = '';

// ── GAME STATE ─────────────────────────────────────────────────────
let STATE  = 'menu'; // menu | jumpball | playing | gameover
let SCORE  = [0,0];
let TIMER  = 0;
let WINNER = -1;
let timeAcc  = 0;
let inReset  = false, resetT = 0;
let nextReceiver = -1;          // Player scored on — checks the ball in next

// ── CHECK-BALL SEQUENCE (real 1-on-1 rule: loser passes to winner, winner passes back) ──
// stage: 'idle' | 'holdA' (loser holds, must pass) | 'flightA' (ball→winner)
//      | 'holdB' (winner holds, must pass back) | 'flightB' (ball→loser, then play resumes)
let checkStage    = 'idle';
let checkLoser    = -1, checkWinner = -1;
let checkFromIdx  = -1, checkToIdx  = -1;
let checkPassT    = 0;
let prevES   = false; // previous Enter/Space state

// ── GAME MODE ──────────────────────────────────────────────────────
let gameMode       = '2p';   // '2p' | '1p'
let botDifficulty  = 'medium'; // 'easy' | 'medium' | 'hard'
let BOT_IDX        = 1;       // which player index the bot controls (always P2 in 1p mode)

// ── ROUND CONDITIONS — re-rolled every round ─────────────────────
let roundTime     = 'night';    // 'night'|'day'|'sunrise'|'sunset'
let roundBallType = 'normal';   // 'normal'|'heavy'|'bouncy'
let roundTwist    = 'none';     // 'none'|'lucky'|'unlucky'|'balanced'
let roundCondBannerT = 0;       // frames to show the round-start conditions banner

// ── JUMP BALL (game-start tip-off) ──────────────────────────────────
let jbLive = false;   // true once the ball is actually falling/contestable
let jbT    = 0;       // countdown before the ball drops

// ── ROUND CHARACTERISTICS — re-rolled at the start of every round ──
// Rubber-band luck: the player who is LOSING gets a better chance at good
// stats; the player who is WINNING gets unluckier the bigger their lead is
// (still possible to roll well, just less likely).
function computeLuck(idx) {
  const diff = SCORE[1-idx] - SCORE[idx];     // positive when idx is behind
  return Math.max(-1, Math.min(1, diff / 7)); // -1 (big lead) .. +1 (big deficit)
}

// Skewed 0-100 roll. luck>0 biases toward high rolls (lucky/trailing player),
// luck<0 biases toward low rolls (unlucky/leading player), luck=0 is uniform.
function rollStat(luck) {
  const exponent = Math.pow(2, -luck * 1.3);
  return Math.round(Math.pow(Math.random(), exponent) * 100);
}

function generateRoundStats() {
  // ── ROUND CONDITIONS ──
  const TIMES = ['night','day','sunrise','sunset'];
  roundTime     = TIMES[Math.floor(Math.random() * TIMES.length)];

  // Ball variety can be disabled entirely by online room settings
  const ballVarietyAllowed = !onlineActive || !onlineSettings || onlineSettings.ballVarietyOn;
  if (!ballVarietyAllowed) {
    roundBallType = 'normal';
  } else {
    const br = Math.random();
    roundBallType = br < 0.75 ? 'normal' : br < 0.875 ? 'heavy' : 'bouncy';
  }

  // Twists can be disabled entirely by online room settings
  const twistsAllowed = !onlineActive || !onlineSettings || onlineSettings.twistsOn;
  if (!twistsAllowed) {
    roundTwist = 'none';
  } else {
    const tr = Math.random();
    roundTwist = tr < 0.75 ? 'none'
               : tr < 0.8125 ? 'lucky'
               : tr < 0.875  ? 'unlucky'
               : tr < 0.9375 ? 'balanced'
               : 'double';
  }

  roundCondBannerT = 110;  // ~1.8s at 60fps

  // Round-characteristics stats can be disabled by online room settings —
  // when off, every player is forced to perfectly average (50) on everything
  const statsAllowed = !onlineActive || !onlineSettings || onlineSettings.statsOn;

  // ── PLAYER STATS ──
  for (const p of PLAYERS) {
    const luck = computeLuck(p.idx);

    if (!statsAllowed) {
      p.statShoot = p.statHeight = p.statAthletic = p.statDefence = 50;
    } else if (roundTwist === 'lucky') {
      // Both players get boosted stats regardless of score
      p.statShoot    = 70 + Math.floor(Math.random()*31); // 70-100
      p.statHeight   = 70 + Math.floor(Math.random()*31);
      p.statAthletic = 70 + Math.floor(Math.random()*31);
      p.statDefence  = 70 + Math.floor(Math.random()*31);
    } else if (roundTwist === 'unlucky') {
      // Both players get weak stats
      p.statShoot    = Math.floor(Math.random()*31);       // 0-30
      p.statHeight   = Math.floor(Math.random()*31);
      p.statAthletic = Math.floor(Math.random()*31);
      p.statDefence  = Math.floor(Math.random()*31);
    } else if (roundTwist === 'balanced') {
      // Perfect 50 on everything — no rubber-band luck either
      p.statShoot    = 50;
      p.statHeight   = 50;
      p.statAthletic = 50;
      p.statDefence  = 50;
    } else {
      // Normal: rubber-band luck applies
      p.statShoot    = rollStat(luck);
      p.statHeight   = rollStat(luck);
      p.statAthletic = rollStat(luck);
      p.statDefence  = rollStat(luck);
    }

    // Derived gameplay multipliers
    p.heightScale = 0.78 + (p.statHeight   / 100) * 0.52;  // 0.78 – 1.30
    p.speedMult   = 0.85 + (p.statAthletic / 100) * 0.30;  // 0.85 – 1.15
    p.jumpMult    = 0.85 + (p.statAthletic / 100) * 0.30;  // 0.85 – 1.15
    p.stealMult   = 0.75 + (p.statDefence  / 100) * 0.50;  // 0.75 – 1.25
    p.shootSkill  = p.statShoot / 100;

    // Best stat label
    const ranked = [
      ['SHOOTING',  p.statShoot],
      ['HEIGHT',    p.statHeight],
      ['ATHLETIC',  p.statAthletic],
      ['DEFENCE',   p.statDefence],
    ].sort((a,b)=>b[1]-a[1]);
    p.statLabel = ranked[0][0];
  }
}
