// ── CHECK BALL (after every score — real 1-on-1 rule) ──────────────
// Sequence: loser holds ball (frozen) → loser passes to winner → winner
// holds (frozen) → winner passes back to loser → normal play resumes.
// Only the current ball-holder's action key does anything, and it always
// fires an immediate clean pass — no charge/hold mechanic during a check.
function startCheckBall(loserIdx, winnerIdx) {
  STATE = 'checking';
  checkLoser  = loserIdx;
  checkWinner = winnerIdx;
  checkStage  = 'holdA';
  checkPassT  = 0;

  generateRoundStats();      // Re-roll for the new round (rubber-band luck applies)
  resetPositions(loserIdx);  // standard positions; ball placed in loser's hands

  // Prevent an already-held key from instantly firing the pass (require fresh press)
  P1.wasAction = K[P1.cfg.action];
  P2.wasAction = K[P2.cfg.action];
}

function updateChecking(dt) {
  // Both players fully frozen — no movement, no jump, no charge, no steal
  for (const p of PLAYERS) {
    p.vx = 0; p.vy = 0; p.grounded = true;
    p.chargeT = 0; p.isCharg = false;
    if (p.pose !== 'celebrate') p.pose = 'idle';
  }

  if (checkStage === 'holdA' || checkStage === 'holdB') {
    const passerIdx   = checkStage === 'holdA' ? checkLoser  : checkWinner;
    const receiverIdx = checkStage === 'holdA' ? checkWinner : checkLoser;
    const passer = PLAYERS[passerIdx];

    // In 1p mode, bot auto-passes after a short pause (0.6s)
    const isBot = gameMode === '1p' && passerIdx === BOT_IDX;
    if (isBot) {
      checkPassT += dt;
      if (checkPassT > 0.6) {
        // Simulate key tap
        checkPassT   = 0;
        checkStage   = checkStage === 'holdA' ? 'flightA' : 'flightB';
        checkFromIdx = passerIdx;
        checkToIdx   = receiverIdx;
        passer.hasBall = false;
        BALL.owner = -1; BALL.trail = [];
        SFX.pass();
      }
      // Keep ball glued to bot's hand while waiting
      BALL.x = passer.x + passer.dir*26;
      BALL.y = passer.y - 54;
      return; // skip human key check below
    }

    const doAction = _isActionHeld(passerIdx, 'action');
    // Ball glued to passer's hand while they're deciding
    BALL.x = passer.x + passer.dir*26;
    BALL.y = passer.y - 54;

    if (doAction && !passer.wasAction) {
      checkStage   = checkStage === 'holdA' ? 'flightA' : 'flightB';
      checkPassT   = 0;
      checkFromIdx = passerIdx;
      checkToIdx   = receiverIdx;
      passer.hasBall = false;
      BALL.owner = -1;
      BALL.trail = [];
      SFX.pass();
    }
    passer.wasAction = doAction;

  } else if (checkStage === 'flightA' || checkStage === 'flightB') {
    checkPassT += dt;
    const DUR = 0.4;
    const t = Math.min(1, checkPassT / DUR);

    const fromP = PLAYERS[checkFromIdx], toP = PLAYERS[checkToIdx];
    const sx = fromP.x + fromP.dir*26, sy = fromP.y - 54;
    const tx = toP.x,                  ty = toP.y - 54;

    // Smooth lerp with a small upward bump for a natural toss feel
    const bump = Math.sin(Math.PI * t) * 24;
    BALL.x = sx + (tx - sx) * t;
    BALL.y = sy + (ty - sy) * t - bump;
    BALL.trail.push({x:BALL.x, y:BALL.y});
    if (BALL.trail.length > 6) BALL.trail.shift();

    if (t >= 1) {
      // Catch
      BALL.owner = checkToIdx;
      toP.hasBall = true;
      BALL.vx = 0; BALL.vy = 0; BALL.trail = [];
      SFX.bounce();

      if (checkStage === 'flightA') {
        // Winner now holds it — must pass back to the loser
        checkStage = 'holdB';
        PLAYERS[checkWinner].wasAction = K[PLAYERS[checkWinner].cfg.action];
      } else {
        // Loser has the ball back — round is live!
        STATE = 'playing';
        checkStage = 'idle';
        // Guard against an already-held action key instantly firing a charge/steal
        P1.requireActionRelease = !!K[P1.cfg.action];
        P2.requireActionRelease = !!K[P2.cfg.action];
        P1.wasAction = !!K[P1.cfg.action];
        P2.wasAction = !!K[P2.cfg.action];
        showRoundStatLabels();
      }
    }
  }
}

// ── BOT AI ──────────────────────────────────────────────────────────
const BOT_KEYS = {};

// windup  = frames the bot "thinks" before firing (simulates reaction time)
// fracLo/Hi = chargeFrac range; 0.64 is the perfect arc to the rim
// stealMult = how many times longer the bot's steal cooldown lasts vs normal
const BOT_CFG = {
  easy:   { reaction:30, errorRate:0.25, fracLo:0.42, fracHi:0.82, windup:50, guardDist:155, aggression:0.40, stealMult:3 },
  medium: { reaction:14, errorRate:0.10, fracLo:0.56, fracHi:0.72, windup:26, guardDist:100, aggression:0.65, stealMult:2 },
  hard:   { reaction:5,  errorRate:0.02, fracLo:0.61, fracHi:0.67, windup:10, guardDist:65,  aggression:0.90, stealMult:1 },
};

let botPlan       = 'idle';
let botPlanT      = 0;
let botWindupT    = 0;       // countdown before direct shot fires
let botTargetFrac = 0.64;   // chargeFrac the bot will use (rolled once per shot)
let botRelPause   = 0;       // frames to keep all keys off (post-steal cool-off)
let botJumpT      = 0;

// ── Human-like personality state ──────────────────────────────────────
// These add believable VARIETY to behavior — different shot spots, the
// occasional hesitation dribble, a defender who anticipates rather than
// snaps to a fixed spot — without touching BOT_CFG's actual skill knobs
// (reaction/errorRate/fracLo-Hi/aggression). Same difficulty, more human.
let botLastHadBall     = false; // detects the exact moment a new possession starts
let botShotSpotOffset  = 220;   // this possession's preferred shooting distance (varies each time)
let botDriveAllTheWay  = false; // this possession: drive hard to the rim instead of pulling up
let botHesitationT     = 0;     // frames remaining of a hesitation dribble (freezes movement briefly)
let botHesitationSeed  = 0;
let botStealCommitT    = 0;     // brief "closing the gap" delay before actually reaching for a steal

function resetBotState() {
  botPlan='idle'; botPlanT=0; botWindupT=0; botTargetFrac=0.64;
  botRelPause=0; botJumpT=0;
  botLastHadBall=false; botShotSpotOffset=220; botDriveAllTheWay=false;
  botHesitationT=0; botHesitationSeed=0; botStealCommitT=0;
  for (const k of Object.keys(BOT_KEYS)) BOT_KEYS[k]=false;
}

// ── Direct shot — completely bypasses the key-charge simulation ──────
// Sets chargeT to the desired fraction and calls _shoot() directly.
// No requireActionRelease, no key-timing bugs, no drift.
function botFireShot() {
  const bot = PLAYERS[BOT_IDX];
  if (!bot.hasBall || BALL.owner !== BOT_IDX || bot.shootCD > 0) return;
  bot.requireActionRelease = false;  // clear any post-steal block
  bot.chargeT = botTargetFrac * bot.maxCharge;  // set the exact charge level
  bot._shoot();                                  // fire using normal physics
  bot.chargeT = 0;
  botPlan = 'advance'; botPlanT = 20; botWindupT = 0;
}

function updateBot(dt) {
  if (gameMode !== '1p') return;

  const cfg   = BOT_CFG[botDifficulty];
  const bot   = PLAYERS[BOT_IDX];
  const human = PLAYERS[1-BOT_IDX];
  const myCX  = bot.tRimCX;   // always LRIM_CX ≈ 171.5 for P2
  const L=bot.cfg.left, R=bot.cfg.right, J=bot.cfg.jump, A=bot.cfg.action;

  BOT_KEYS[L]=false; BOT_KEYS[R]=false; BOT_KEYS[J]=false; BOT_KEYS[A]=false;

  // ── New-possession personality roll ─────────────────────────────────
  // The instant the bot gains the ball, it picks THIS possession's
  // preferred shot distance and whether to drive hard to the rim instead
  // of pulling up — real players don't shoot from the exact same spot
  // every single time. Shot accuracy (fracLo/fracHi) is untouched, so
  // difficulty doesn't change — only where it likes to shoot from does.
  const justGotBall = bot.hasBall && !botLastHadBall;
  botLastHadBall = bot.hasBall;
  if (justGotBall) {
    botShotSpotOffset = 150 + Math.random()*170;      // 150–320px from the rim
    botDriveAllTheWay = Math.random() < 0.30;         // ~30% of the time, take it all the way in
    const hesitateChance = cfg.reaction >= 20 ? 0.5 : 0.32; // easier bots hesitate a bit more, not less accurate
    botHesitationT = Math.random() < hesitateChance ? (10 + Math.floor(Math.random()*16)) : 0;
    botHesitationSeed = Math.random() < 0.5 ? -1 : 1;
  }

  // ── Release pause (post-steal, prevents requireActionRelease bleed) ──
  if (botRelPause > 0) { botRelPause--; return; }

  // ── Error injection ──
  if (Math.random() < cfg.errorRate) return;

  // ── Shot windup countdown ─────────────────────────────────────────
  // Bot stands still during windup for a clean, consistent shot position.
  // On frame 0 it fires directly — no key simulation at all.
  if (botWindupT > 0) {
    botWindupT--;
    if (botWindupT === 0) botFireShot();
    return;  // stand still the whole time
  }

  // ── Plan re-evaluation ─────────────────────────────────────────────
  botPlanT--;
  if (botPlanT <= 0) {
    botPlanT = cfg.reaction + Math.floor(Math.random()*8);

    if (BALL.owner === BOT_IDX) {
      const dist = Math.abs(bot.x - myCX);
      if (bot._canDunk())
        botPlan = 'dunk';
      else if (dist < 340 && Math.random() < cfg.aggression)
        botPlan = 'shoot';
      else
        botPlan = 'advance';
    } else if (BALL.owner === 1-BOT_IDX) {
      const d = Math.hypot(bot.x-human.x, bot.y-human.y);
      botPlan = (d < cfg.guardDist && Math.random()<cfg.aggression) ? 'steal' : 'guard';
    } else {
      botPlan = 'chase';
    }
  }

  // ── Execute plan ────────────────────────────────────────────────────
  if (botPlan === 'chase') {
    _botMoveToward(bot, BALL.x, L, R);
    if (BALL.y < bot.y-55 && bot.grounded && botJumpT<=0) { BOT_KEYS[J]=true; botJumpT=14; }
  }

  else if (botPlan === 'advance') {
    const targetOffset = botDriveAllTheWay ? 60 : botShotSpotOffset;
    _botAdvanceWithPersonality(bot, myCX + targetOffset, L, R);
  }

  else if (botPlan === 'shoot') {
    if (!bot.hasBall || BALL.owner !== BOT_IDX) { botPlan='chase'; return; }
    const targetOffset = botDriveAllTheWay ? 60 : botShotSpotOffset;
    const dist = Math.abs(bot.x - myCX);
    if (dist > targetOffset + 40) {
      _botAdvanceWithPersonality(bot, myCX + targetOffset, L, R);
    } else {
      // In range: roll target fraction and start windup — bot stands still and fires
      botTargetFrac = cfg.fracLo + Math.random()*(cfg.fracHi - cfg.fracLo);
      botWindupT    = cfg.windup + Math.floor(Math.random()*12);
      botPlanT      = botWindupT + 22;  // don't re-evaluate until after shot fires
    }
  }

  else if (botPlan === 'dunk') {
    if (!bot.hasBall || BALL.owner !== BOT_IDX) { botPlan='chase'; return; }
    _botMoveToward(bot, myCX, L, R);
    if (bot.grounded && botJumpT<=0) { BOT_KEYS[J]=true; botJumpT=16; }
    // Fire directly the moment we're in dunk range mid-air
    if (!bot.grounded && bot._canDunk()) {
      botTargetFrac = botDifficulty==='hard' ? 0.71 : 0.10;  // windmill on hard, simple otherwise
      botFireShot();
    }
  }

  else if (botPlan === 'guard') {
    // Predictive positioning: leads the ball-handler's current velocity
    // instead of just snapping to their current spot — reads like a
    // defender tracking the play rather than a static marker glued to
    // wherever the human happens to be standing this exact frame.
    const anticipatedX = human.x + human.vx*6;
    const targetX = anticipatedX + (bot.dir>0 ? -70 : 70);
    _botMoveToward(bot, targetX, L, R);
    if (human.isCharg && bot.grounded && Math.random()<cfg.aggression && botJumpT<=0) {
      BOT_KEYS[J]=true; botJumpT=14;
    }
  }

  else if (botPlan === 'steal') {
    _botMoveToward(bot, human.x, L, R);
    const d = Math.hypot(bot.x-human.x, bot.y-human.y);
    if (d < 90 && bot.stealActCD<=0) {
      // Brief "closing the gap" commit delay before actually reaching for
      // it — reads like a defender deciding to make their move rather
      // than an instant trigger the moment a distance threshold is crossed.
      botStealCommitT++;
      if (botStealCommitT > 4) {
        BOT_KEYS[A]=true;
        botRelPause=4;  // release pause so requireActionRelease clears
        botStealCommitT=0;
      }
    } else {
      botStealCommitT = 0;
    }
  }

  if (botJumpT>0) botJumpT--;
}

// Dead zone of 30px prevents the oscillation caused by the bot
// repeatedly overshooting a target and switching directions each frame.
function _botMoveToward(bot, tx, lk, rk) {
  const d = tx - bot.x;
  if      (d < -30) BOT_KEYS[lk]=true;
  else if (d >  30) BOT_KEYS[rk]=true;
}

// Same pathing as _botMoveToward, but occasionally freezes movement for
// a few frames mid-approach — a hesitation dribble, not a direction
// reversal, so it reads as "thinking"/juking rather than glitching.
// Purely cosmetic: doesn't change how far the bot travels or how
// accurately it shoots, just how it looks getting there.
function _botAdvanceWithPersonality(bot, targetX, lk, rk) {
  if (botHesitationT > 0) {
    botHesitationT--;
    if (botHesitationT % 3 === 0) return; // stand still this frame — hesitation beat
  }
  _botMoveToward(bot, targetX, lk, rk);
}

  { name:'Legend',      min:2700, base:'#ff2f6e', glow:'#ffffff', style:'rainbow' },
];

function getEloTier(elo) {
  let tier = ELO_TIERS[0];
  for (const t of ELO_TIERS) if (elo >= t.min) tier = t;
  return tier;
}

// Draws a tier-appropriate animated background inside the given rect.
// Used by leaderboard rows (and reusable anywhere a rank badge is shown).
function drawTierBackground(x, y, w, h, elo, now, radius=8) {
  const tier = getEloTier(elo);
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x, y, w, h, radius); ctx.clip();

  if (tier.style === 'rainbow') {
    // Legend: full animated hue-cycling gradient sweep
    const hueBase = (now/18) % 360;
    const g = ctx.createLinearGradient(x, y, x+w, y);
    for (let i=0; i<=6; i++) {
      g.addColorStop(i/6, `hsla(${(hueBase + i*60)%360},85%,55%,0.55)`);
    }
    ctx.fillStyle = g; ctx.fillRect(x,y,w,h);
    // Shimmering highlight sweep
    const sweepX = x + ((now/900) % 1) * w*1.4 - w*0.2;
    const sg = ctx.createLinearGradient(sweepX-30,0,sweepX+30,0);
    sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(0.5,'rgba(255,255,255,0.35)'); sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = sg; ctx.fillRect(x,y,w,h);
  } else {
    const g = ctx.createLinearGradient(x, y, x, y+h);
    g.addColorStop(0, tier.base+'55');
    g.addColorStop(1, tier.base+'15');
    ctx.fillStyle = g; ctx.fillRect(x,y,w,h);

    if (tier.style === 'pulse') {
      const p = 0.15 + Math.sin(now/280)*0.12;
      ctx.fillStyle = tier.glow + Math.round((0.1+p)*255).toString(16).padStart(2,'0');
      ctx.fillRect(x,y,w,h);
    } else if (tier.style === 'shimmer' || tier.style === 'shine') {
      const sweepX = x + ((now/1100) % 1) * w*1.3 - w*0.15;
      const sg = ctx.createLinearGradient(sweepX-20,0,sweepX+20,0);
      sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(0.5,tier.glow+'44'); sg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle = sg; ctx.fillRect(x,y,w,h);
    } else if (tier.style === 'sparkle') {
      for (let i=0;i<5;i++) {
        const sx = x + ((i*71 + now/25) % w);
        const sy = y + ((i*37) % h);
        const tw = 0.4+Math.sin(now/150 + i*2)*0.4;
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0,tw)})`;
        ctx.fillRect(sx, sy, 2, 2);
      }
    }
  }
  ctx.restore();
  return tier;
}

// Standard zero-sum ELO. Beating a much-lower-rated opponent yields a
// small gain; beating similar/higher-rated yields a large gain. Losing
// mirrors this exactly (same K, symmetric formula) — whatever the
// winner gains, the loser loses, except where the 0-floor clamps it.
function calcEloChange(myElo, oppElo, didWin) {
  const K = 32;
  const expected = 1 / (1 + Math.pow(10, (oppElo - myElo)/400));
  return Math.round(K * ((didWin?1:0) - expected));
}

// ── One-shot ELO application at the end of an online match ──────────
let onlineMyMatchElo   = 0;
let onlineOppMatchElo  = 0;
let onlineIsQueueMatch = false;
let _eloAppliedThisMatch = false;

async function maybeApplyEloForMatch() {
  if (_eloAppliedThisMatch) return;
  if (!onlineActive || WINNER < 0) return;
  _eloAppliedThisMatch = true;

  // Room-hosted (non-queue) matches skip ELO entirely if either side is under 100
  if (!onlineIsQueueMatch && (onlineMyMatchElo < 100 || onlineOppMatchElo < 100)) return;

  const myIdx = onlineIsHost ? 0 : 1;
  const didWin = WINNER === myIdx;
  const delta = calcEloChange(onlineMyMatchElo, onlineOppMatchElo, didWin);
  const newElo = Math.max(0, onlineMyMatchElo + delta);
  await saveMyElo(newElo, didWin);
}


// Per-TAB identity (sessionStorage isn't shared across tabs, so each
// tab/device gets its own id even if two tabs share the same browser)
let myClientId = sessionStorage.getItem('hoopfire_client_id');
if (!myClientId) {
  myClientId = 'c' + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem('hoopfire_client_id', myClientId);
}

// 5-character room code — uppercase alphanumeric, ambiguous chars excluded
function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i=0;i<5;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function defaultRoomSettings() {
  return { winScore:5, twistsOn:true, statsOn:true, ballVarietyOn:true };
}

// ── Live room/session state ─────────────────────────────────────────
let _roomChannel  = null;   // active Supabase channel for the current room
let _roomCache    = null;   // { code, hostId, guestId, settings, startGame }
let _queueChannel = null;
let _queueMatched = false;

const NET_REMOTE_KEYS = {};      // host reads P2 input from here instead of local K
let   _lastMirroredScore = [0,0];
let   _lastSnapshotSentAt = 0;
let   _lastInputSentAt    = 0;
const NET_TICK_MS = 50;          // ~20Hz for both snapshot and input traffic

function netGetRoom(code) {
  if (!_roomCache || _roomCache.code !== code) return null;
  return _roomCache;
}

// ── HOST: create a room ──────────────────────────────────────────────
// presetCode/presetGuestId are used by the Quick-Match pairing flow,
// which already knows both participants before the room exists.
function netCreateRoom(settings, presetCode, presetGuestId) {
  const code = presetCode || genRoomCode();
  _roomCache = {
    code, hostId: myClientId, guestId: presetGuestId||null, settings, startGame:false,
    hostName: myProfile.name, hostElo: myProfile.elo,
    guestName: null, guestElo: null,
  };

  const ch = sbClient.channel('room-'+code, { config:{ broadcast:{ self:false } } });

  ch.on('broadcast', {event:'join_request'}, (msg) => {
    const { guestId, name, elo } = msg.payload;
    if (_roomCache.guestId && _roomCache.guestId !== guestId) return; // room already full
    _roomCache.guestId   = guestId;
    _roomCache.guestName = name;
    _roomCache.guestElo  = elo;
    _broadcastRoomState();
  });

  ch.on('broadcast', {event:'input'}, (msg) => {
    Object.assign(NET_REMOTE_KEYS, msg.payload.keys);
  });

  ch.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      _roomChannel = ch;
      if (presetGuestId) _broadcastRoomState(); // quick-match: guest is already known
    }
  });

  return code;
}

function _broadcastRoomState() {
  if (!_roomChannel || !_roomCache) return;
  try { _roomChannel.send({ type:'broadcast', event:'room_state', payload:{ room:_roomCache } }); } catch(e){}
}

// ── GUEST: join a room by code (async — real network round trip) ────
// Case-insensitive: input is normalized to uppercase before lookup.
function netJoinRoom(rawCode) {
  const code = String(rawCode).trim().toUpperCase();
  return new Promise((resolve) => {
    let settled = false;
    const ch = sbClient.channel('room-'+code, { config:{ broadcast:{ self:false } } });

    ch.on('broadcast', {event:'room_state'}, (msg) => {
      const room = msg.payload.room;
      if (room.guestId !== myClientId && room.hostId !== myClientId) return; // not for us
      _roomCache = room;
      if (!settled) { settled = true; resolve({ ok:true, code }); }
    });

    ch.on('broadcast', {event:'room_closed'}, () => { _roomCache = null; });

    ch.on('broadcast', {event:'start_game'}, (msg) => {
      if (_roomCache) { _roomCache.startGame = true; _roomCache.settings = msg.payload.settings; }
    });

    ch.on('broadcast', {event:'state_snapshot'}, (msg) => {
      _applyRemoteSnapshot(msg.payload.s);
    });

    ch.subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        _roomChannel = ch;
        ch.send({ type:'broadcast', event:'join_request', payload:{ guestId: myClientId, name: myProfile.name, elo: myProfile.elo } });
        // Timeout if the host never confirms (room doesn't exist / offline)
        setTimeout(() => {
          if (!settled) { settled=true; try{ch.unsubscribe();}catch(e){} resolve({ ok:false, reason:'not_found' }); }
        }, 4000);
      }
    });
  });
}

function netUpdateRoomSettings(code, settings) {
  if (!_roomCache || _roomCache.code !== code) return;
  _roomCache.settings = settings;
  _broadcastRoomState();
}

function netStartRoom(code) {
  if (!_roomChannel || !_roomCache) return;
  _roomCache.startGame = true;
  try { _roomChannel.send({ type:'broadcast', event:'start_game', payload:{ settings:_roomCache.settings } }); } catch(e){}
}

function netLeaveRoom(code, wasHost) {
  if (_roomChannel) {
    if (wasHost) { try { _roomChannel.send({ type:'broadcast', event:'room_closed', payload:{} }); } catch(e){} }
    try { _roomChannel.unsubscribe(); } catch(e){}
  }
  _roomChannel = null;
  _roomCache   = null;
}

// ── Quick-Match — Supabase Presence tracks who's currently searching ──
function netQueueJoin() {
  _queueMatched = false;
  const ch = sbClient.channel('hoopfire-queue', { config:{ presence:{ key: myClientId } } });

  ch.on('presence', {event:'sync'}, () => {
    if (_queueMatched) return;
    const state = ch.presenceState();
    const entries = Object.keys(state).map(id => ({ id, t: (state[id][0]&&state[id][0].t) || 0 }));
    entries.sort((a,b)=>a.t-b.t);
    if (entries.length < 2) return;
    const [a,b] = entries;
    if (myClientId !== a.id && myClientId !== b.id) return; // not part of the earliest pair

    _queueMatched = true;
    const code = genRoomCode();
    try { ch.untrack(); } catch(e){}
    try { ch.unsubscribe(); } catch(e){}

    if (myClientId === a.id) {
      // Earlier-queued client becomes host
      netCreateRoom(defaultRoomSettings(), code, b.id);
      _roomCache.isQueueMatch = true;
      onlineIsHost = true;
      onlineRoomCode = code;
      onlineIsQueueMatch = true;
      onlineLobbySettings = defaultRoomSettings();
      menuScreen = 'online_lobby';
    } else {
      // Later client becomes guest — brief delay lets the host's
      // channel finish subscribing before the join_request arrives
      setTimeout(() => {
        netJoinRoom(code).then(res => {
          if (res.ok) {
            onlineIsHost = false;
            onlineRoomCode = res.code;
            onlineIsQueueMatch = true;
            onlineLobbySettings = _roomCache ? _roomCache.settings : defaultRoomSettings();
            menuScreen = 'online_lobby';
          }
        });
      }, 400);
    }
  });

  ch.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      _queueChannel = ch;
      await ch.track({ t: Date.now() });
    }
  });
}

function netQueueLeave() {
  if (_queueChannel) { try { _queueChannel.untrack(); _queueChannel.unsubscribe(); } catch(e){} }
  _queueChannel = null;
  _queueMatched = false;
}

// Matching now happens inside the Presence 'sync' callback above (event
// driven, not polled). Kept as a no-op so the existing per-frame call
// site in the queue screen doesn't need to change.
function netQueueCheck() { return null; }

// ── Game-state broadcasting (HOST → GUEST) ───────────────────────────
function netMaybeBroadcastState(now) {
  if (!onlineActive || !onlineIsHost || !_roomChannel) return;
  if (now - _lastSnapshotSentAt < NET_TICK_MS) return;
  _lastSnapshotSentAt = now;

  const s = {
    STATE, SCORE:[SCORE[0],SCORE[1]], WINNER,
    roundTime, roundBallType, roundTwist, roundCondBannerT,
    checkStage, checkLoser, checkWinner, checkFromIdx, checkToIdx, checkPassT,
    jbLive, jbT,
    P1: _serializePlayerForNet(P1),
    P2: _serializePlayerForNet(P2),
    BALL: { x:BALL.x, y:BALL.y, rot:BALL.rot, owner:BALL.owner, isDunk:BALL.isDunk },
  };
  try { _roomChannel.send({ type:'broadcast', event:'state_snapshot', payload:{s} }); } catch(e){}
}

function _serializePlayerForNet(p) {
  return {
    x:p.x, y:p.y, dir:p.dir, grounded:p.grounded, hasBall:p.hasBall,
    pose:p.pose, legPh:p.legPh, dribbleT:p.dribbleT, isCharg:p.isCharg,
    chargeT:p.chargeT, stealActCD:p.stealActCD, dunkAnimT:p.dunkAnimT,
    dunkType:p.dunkType, celebT:p.celebT, lastPts:p.lastPts,
    heightScale:p.heightScale, statLabel:p.statLabel, statLabelT:p.statLabelT,
    statShoot:p.statShoot, statHeight:p.statHeight,
    statAthletic:p.statAthletic, statDefence:p.statDefence,
  };
}

// ── Local input capture + send (GUEST → HOST) ────────────────────────
function netMaybeSendInput(now) {
  if (!onlineActive || onlineIsHost || !_roomChannel) return;
  if (now - _lastInputSentAt < NET_TICK_MS) return;
  _lastInputSentAt = now;

  // Guest can use EITHER WASD or Arrow keys locally — both layouts are
  // merged here into a single set of booleans, then written under P2's
  // canonical key names so the host's side needs no special-casing to
  // understand it (host just reads NET_REMOTE_KEYS[P2.cfg.xxx] normally).
  const left   = !!(K['KeyA']  || K['ArrowLeft']);
  const right  = !!(K['KeyD']  || K['ArrowRight']);
  const jump   = !!(K['KeyW']  || K['ArrowUp']);
  const jump2  = !!(K['Space'] || K['ShiftRight']);
  const action = !!(K['KeyS']  || K['ArrowDown']);

  const c = P2.cfg;
  const keys = {};
  keys[c.left]=left; keys[c.right]=right;
  keys[c.jump]=jump; keys[c.jump2]=jump2;
  keys[c.action]=action;
  try { _roomChannel.send({ type:'broadcast', event:'input', payload:{keys} }); } catch(e){}
}

// ── GUEST: apply an incoming snapshot directly onto the live globals ─
// Because every draw()/render() function reads these same module-level
// globals, overwriting them here is enough — no separate render path
// is needed for the guest.
function _applyRemoteSnapshot(s) {
  if (s.SCORE[0] > _lastMirroredScore[0] || s.SCORE[1] > _lastMirroredScore[1]) {
    const scorer = s.SCORE[0] > _lastMirroredScore[0] ? 0 : 1;
    const pts = s.SCORE[scorer] - _lastMirroredScore[scorer];
    _replicateScoreFX(scorer, pts);
  }
  _lastMirroredScore = [s.SCORE[0], s.SCORE[1]];

  STATE = s.STATE;
  SCORE[0]=s.SCORE[0]; SCORE[1]=s.SCORE[1];
  WINNER = s.WINNER;
  roundTime=s.roundTime; roundBallType=s.roundBallType; roundTwist=s.roundTwist;
  roundCondBannerT=s.roundCondBannerT;
  checkStage=s.checkStage; checkLoser=s.checkLoser; checkWinner=s.checkWinner;
  checkFromIdx=s.checkFromIdx; checkToIdx=s.checkToIdx; checkPassT=s.checkPassT;
  jbLive=s.jbLive; jbT=s.jbT;

  Object.assign(P1, s.P1);
  Object.assign(P2, s.P2);
  BALL.x=s.BALL.x; BALL.y=s.BALL.y; BALL.rot=s.BALL.rot; BALL.owner=s.BALL.owner; BALL.isDunk=s.BALL.isDunk;
  BALL.trail.push({x:BALL.x,y:BALL.y});
  if (BALL.trail.length>14) BALL.trail.shift();
}

// Cosmetic-only replication of the score celebration on the guest's
// screen (particles/flash/shake/sound) — purely visual, not authoritative.
function _replicateScoreFX(scorer, pts) {
  const h = scorer===0 ? RH : LH;
  const hcx = (h.rimX+h.rimRX)/2;
  const cols = scorer===0
    ? ['#3399ff','#66aaff','#ffffff','#aaddff','#ffee88']
    : ['#ff4422','#ff8844','#ffffff','#ffcc55','#ffee88'];
  burst(hcx, h.rimY-8, cols, 55, 13);
  burst(hcx, h.rimY, ['#ffee44','#ffffffff'], 18, 8);
  addFText(hcx, h.rimY-50, `+${pts}`, pts>=3?'#ffcc00':'#ffffff');
  shake(pts>=4?28:pts>=2?18:12);
  crowdHype=1.0;
  SFX.score();
}

// ── Online session state (used once a match is actually launched) ──
let onlineActive   = false;
let onlineSettings = null;

// ── BALL–PLAYER INTERACTION ────────────────────────────────────────
function updatePossession() {
  if (BALL.owner>=0) {
    const own = PLAYERS[BALL.owner];
    const dribbling = own.grounded && Math.abs(own.vx) > 0.8 && !own.isCharg;

    if (dribbling) {
      // ── DRIBBLE: ball bounces between floor and hip while running ──
      own.dribbleT += 0.19;
      const bounce = Math.abs(Math.sin(own.dribbleT)); // 0 = floor, 1 = hand height
      BALL.x = own.x + own.dir * 26;
      BALL.y = own.y - bounce * 46;   // floor-level → ~hip height

      // Dribble bounce sound when ball touches floor
      const prevBounce = Math.abs(Math.sin(own.dribbleT - 0.19));
      if (prevBounce > bounce && bounce < 0.12) SFX.bounce();

      // Short trail for dribble
      BALL.trail.push({x:BALL.x, y:BALL.y});
      if (BALL.trail.length > 5) BALL.trail.shift();
    } else {
      // ── CARRY: hold ball at chest/hand when standing, charging, or mid-air ──
      own.dribbleT = 0;
      BALL.x = own.x + own.dir * 26;
      BALL.y = own.y - 54;
      BALL.trail = [];
    }
    return;
  }

  if (BALL.pickupDelay>0) return;

  // Auto pick-up — two zones scaled by each player's Defence stat (stealMult):
  //   Air pickup:    ball in flight → smaller radius, harder to grab without effort
  //   Ground pickup: ball resting near floor → larger comfortable grab radius
  const ballOnGround = (BALL.y + B_R) >= FLOOR - 28 && Math.abs(BALL.vy) < 5;

  for (const p of PLAYERS) {
    if (p.shootCD>10 || p.stealCD>0) continue;
    // Defence stat scales the pickup reach
    const baseRadius = ballOnGround ? 54 : 36;     // ground=easy, air=smaller window
    const pickupR    = baseRadius * p.stealMult;    // defence stat widens the window
    const dist = Math.hypot(BALL.x-p.x, BALL.y-(p.y-40));
    if (dist < pickupR) {
      BALL.owner = p.idx;
      BALL.vx=0; BALL.vy=0;
      p.hasBall=true;
      PLAYERS[1-p.idx].hasBall=false;
      break;
    }
  }
}

function updatePassiveSteal() {
  // Gradual passive steal: when very close to ball carrier
  if (BALL.owner<0) return;
  const own=PLAYERS[BALL.owner], def=PLAYERS[1-BALL.owner];
  if (def.stealCD>0) return;
  const dist=Math.hypot(def.x-own.x, def.y-own.y);
  if (dist<68 && Math.random()<0.014) {
    BALL.owner=def.idx;
    BALL.vx=def.dir*2.8; BALL.vy=-2.8;
    BALL.pickupDelay=8;
    def.hasBall=true; own.hasBall=false;
    def.stealCD=75; own.stealCD=38;
    SFX.steal(); shake(5);
  }
}

// ── MAIN UPDATE ────────────────────────────────────────────────────
function update(dt) {
  // No game clock — play is infinite until WIN_PTS is reached
  // (Cosmetic decay — shake/crowd/particles/flash — now runs once per
  // frame from the main loop regardless of state, so it also animates
  // during jumpball/checking, and continues on the guest's mirrored view.)

  // Mid-score reset delay — wait for BOTH the timer AND the score
  // animation (flash text + floating particles) to fully finish
  if (inReset) {
    resetT-=dt;
    const animDone = scoreFlashT<=0 && FTEXTS.length===0;
    if (resetT<=0 && animDone) {
      inReset=false;
      const loserIdx  = nextReceiver;   // player who got scored on
      const winnerIdx = 1 - loserIdx;   // player who scored
      nextReceiver=-1;
      startCheckBall(loserIdx, winnerIdx);
    }
    return;
  }

  // Player updates (bot runs before player so keys are set)
  updateBot(dt);
  P1.update(dt); P2.update(dt);
  P1.hasBall = BALL.owner===0;
  P2.hasBall = BALL.owner===1;

  updatePossession();
  BALL.update();

  // Check scoring
  const scorer = BALL.checkScore();
  if (scorer>=0) {
    BALL.justScored=true;
    const basePts = BALL.shotWas3 ? 2 : 1;  // 1pt inside, 2pts from range
    const pts = (roundTwist === 'double') ? basePts * 2 : basePts;
    SCORE[scorer]+=pts;
    PLAYERS[scorer].celebT=95;
    PLAYERS[scorer].lastPts=pts;

    const h = scorer===0 ? RH : LH;
    const hcx=(h.rimX+h.rimRX)/2;
    const cols = scorer===0
      ? ['#3399ff','#66aaff','#ffffff','#aaddff','#ffee88']
      : ['#ff4422','#ff8844','#ffffff','#ffcc55','#ffee88'];

    burst(hcx, h.rimY-8, cols, 55, 13);
    burst(hcx, h.rimY, ['#ffee44','#ffffffff'], 18, 8);
    const isDouble = roundTwist === 'double';
    const flashLabel = isDouble
      ? (BALL.shotWas3 ? '×2 FOUR!' : '×2 TWO!')
      : (BALL.shotWas3 ? '2 POINTS!' : 'SCORE!');
    addFText(hcx, h.rimY-50, `+${pts}${BALL.shotWas3&&!isDouble?' 🔥':isDouble?' 🔥🔥':''}`, isDouble?'#ff9900':BALL.shotWas3?'#ffcc00':'#ffffff');

    shake(pts>=4?28:pts===2&&BALL.shotWas3?18:12);
    crowdHype=1.0;
    SFX.score();
    scoreFlashT=60; scoreFlashText=flashLabel;

    if (SCORE[scorer]>=WIN_PTS) {
      WINNER=scorer;
      setTimeout(()=>{ STATE='gameover'; },1900);
    } else {
      inReset=true; resetT=1.3;
      nextReceiver = 1 - scorer;   // player scored on will check the ball in
    }
  }
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  ctx.save();
  if (SHAKE>0.3) ctx.translate((Math.random()-0.5)*SHAKE, (Math.random()-0.5)*SHAKE*0.55);

  drawArena();
  drawCourt();

  // Ball behind players when loose
  if (BALL.owner<0) BALL.draw();

  drawHoop(LH,true);
  drawHoop(RH,false);

  drawParts();
  P1.draw(); P2.draw();

  // Ball on top when carried
  if (BALL.owner>=0) BALL.draw();

  drawFTexts();

  // Score flash
  if (scoreFlashT>0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, scoreFlashT/20);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${scoreFlashText.includes('3')? 58:48}px Arial Black`;
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=24;
    ctx.fillStyle='#ffee44';
    ctx.fillText(scoreFlashText, W/2, H/2-20);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // ── ROUND CONDITIONS BANNER — shown at start of each round ──
  if (roundCondBannerT > 0) {
    const alpha = Math.min(1, roundCondBannerT / 30);
    ctx.save(); ctx.globalAlpha = alpha;
    drawRoundCondBanner();
    ctx.restore();
  }

  ctx.restore();
  drawHUD();
}

// ── ROUND CONDITIONS TOAST (slim, top-centre, no time display) ────
function drawRoundCondBanner() {
  // Only show if there's something worth calling out — skip if normal ball + no twist
  const hasSpecial = roundBallType !== 'normal' || roundTwist !== 'none';
  if (!hasSpecial) return;

  const parts = [];
  if (roundBallType === 'heavy')  parts.push({ icon:'⚫', label:'Heavy Ball',  col:'#aaaacc' });
  if (roundBallType === 'bouncy') parts.push({ icon:'🔵', label:'Bouncy Ball', col:'#66ccff' });
  if (roundTwist === 'lucky')     parts.push({ icon:'⭐', label:'Lucky!',       col:'#ffdd44' });
  if (roundTwist === 'unlucky')   parts.push({ icon:'💀', label:'Unlucky!',     col:'#ff5555' });
  if (roundTwist === 'balanced')  parts.push({ icon:'⚖️', label:'Balanced',    col:'#88eeff' });
  if (roundTwist === 'double')    parts.push({ icon:'×2', label:'Double Pts!', col:'#ff9900' });
  if (parts.length === 0) return;

  const padding = 14, gap = 20;
  ctx.font = 'bold 13px Arial Black';
  let totalW = padding*2 + (parts.length-1)*gap;
  const itemWidths = parts.map(p => {
    return ctx.measureText(p.icon+' '+p.label).width + 8;
  });
  totalW += itemWidths.reduce((a,b)=>a+b,0);

  const bh = 30, bx = W/2 - totalW/2, by = 70;
  ctx.fillStyle = 'rgba(4,6,20,0.88)';
  ctx.beginPath(); ctx.roundRect(bx, by, totalW, bh, 8); ctx.fill();

  let cx = bx + padding;
  for (let i=0; i<parts.length; i++) {
    const p = parts[i];
    ctx.fillStyle = p.col;
    ctx.font = 'bold 13px Arial Black';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(p.icon+' '+p.label, cx, by+bh/2);
    cx += itemWidths[i] + gap;
    if (i < parts.length-1) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(cx-gap/2-0.5, by+6, 1, bh-12);
    }
  }
}

// ── JUMP BALL RENDER ─────────────────────────────────────────────
function renderJumpBall(now) {
  ctx.save();
  drawArena();
  drawCourt();
  if (BALL.owner<0) BALL.draw();
  drawHoop(LH,true);
  drawHoop(RH,false);
  drawParts();
  P1.draw(); P2.draw();
  if (BALL.owner>=0) BALL.draw();
  ctx.restore();
  drawHUD();

  // ── Banner ──
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';

  if (!jbLive) {
    // Countdown phase
    ctx.font='bold 34px Arial Black';
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=20;
    ctx.fillStyle='#ffcc33';
    ctx.fillText('JUMP BALL', W/2, 150);
    ctx.shadowBlur=0;

    const n = Math.ceil(jbT);
    if (n > 0) {
      const frac = jbT - Math.floor(jbT);
      const pulse = 0.7 + (1-frac)*0.5;
      ctx.globalAlpha = Math.min(1, pulse);
      ctx.font='bold 64px Arial Black';
      ctx.shadowColor='#ffffff'; ctx.shadowBlur=18;
      ctx.fillStyle='#ffffff';
      ctx.fillText(n, W/2, 200);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
  } else {
    // Live phase — ball is contestable
    const pulse = 0.6 + Math.sin(now/140)*0.4;
    ctx.globalAlpha = pulse;
    ctx.font='bold 26px Arial Black';
    ctx.shadowColor='#44ff88'; ctx.shadowBlur=14;
    ctx.fillStyle='#66ff99';
    ctx.fillText('JUMP FOR IT!', W/2, 150);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.restore();

  // Round conditions banner
  if (roundCondBannerT > 0) {
    const alpha = Math.min(1, roundCondBannerT / 30);
    ctx.save(); ctx.globalAlpha = alpha; drawRoundCondBanner(); ctx.restore();
  }
}

// ── CHECK-BALL RENDER ────────────────────────────────────────────
function renderChecking(now) {
  ctx.save();
  drawArena();
  drawCourt();
  if (BALL.owner<0) BALL.draw();
  drawHoop(LH,true);
  drawHoop(RH,false);
  drawParts();
  P1.draw(); P2.draw();
  if (BALL.owner>=0) BALL.draw();
  ctx.restore();
  drawHUD();

  // Banner: who's checking the ball, and to whom
  const passerIdx = (checkStage==='holdA'||checkStage==='flightA') ? checkLoser : checkWinner;
  const recvIdx   = 1 - passerIdx;
  const passerCol = passerIdx===0 ? '#3399ff' : '#ff4422';
  const isReturn  = checkStage==='holdB' || checkStage==='flightB';

  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.font='bold 26px Arial Black';
  ctx.shadowColor='#ffaa00'; ctx.shadowBlur=14;
  ctx.fillStyle='#ffcc33';
  ctx.fillText(isReturn ? 'CHECK — PASS IT BACK' : 'CHECK BALL', W/2, 130);
  ctx.shadowBlur=0;

  if (checkStage==='holdA' || checkStage==='holdB') {
    const pulse = 0.55 + Math.sin(now/220)*0.45;
    ctx.globalAlpha = pulse;
    ctx.font='bold 20px Arial Black';
    ctx.shadowColor=passerCol; ctx.shadowBlur=10;
    ctx.fillStyle=passerCol;
    ctx.fillText(`P${passerIdx+1}: press your action key to pass`, W/2, 166);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.restore();

  // Also show the round-conditions banner during the check sequence
  if (roundCondBannerT > 0) {
    const alpha = Math.min(1, roundCondBannerT / 30);
    ctx.save(); ctx.globalAlpha = alpha; drawRoundCondBanner(); ctx.restore();
  }
}

let lastT=0;

function loop(now) {
  const dt = Math.min((now-lastT)/1000, 0.055);
  lastT=now;
  ctx.clearRect(0,0,W,H);

  const eSpaceNow = K['Space']||K['Enter'];
  const isOnlineGuest = onlineActive && !onlineIsHost;

  if (STATE==='menu') {
    renderMenu(now);
    // Navigation is click-driven only — Enter/Space no longer force-launches
    // a game (that was bypassing mode/setup/lobby selection entirely).
  }
  else if (STATE==='jumpball') {
    if (!isOnlineGuest) updateJumpBall(dt);   // guest just mirrors host's snapshots
    updateCosmeticFX(dt);
    renderJumpBall(now);
  }
  else if (STATE==='checking') {
    if (!isOnlineGuest) updateChecking(dt);
    updateCosmeticFX(dt);
    renderChecking(now);
  }
  else if (STATE==='playing') {
    if (!isOnlineGuest) update(dt);
    updateCosmeticFX(dt);
    render();
  }
  else if (STATE==='gameover') {
    // Show live background + overlay
    ctx.save();
    drawArena(); drawCourt();
    drawHoop(LH,true); drawHoop(RH,false);
    drawParts(); updateParts();
    P1.draw(); P2.draw(); BALL.draw();
    ctx.restore();
    renderGameOver(now);
    if (onlineActive) maybeApplyEloForMatch(); // idempotent — no-ops after the first call
    if (eSpaceNow && !prevES) {
      // Clean up any online room this session was hosting before returning to menu
      if (onlineActive && onlineIsHost && onlineRoomCode) netLeaveRoom(onlineRoomCode, true);
      if (onlineActive && !onlineIsHost && onlineRoomCode) netLeaveRoom(onlineRoomCode, false);
      onlineActive=false; onlineSettings=null; onlineRoomCode=null; WIN_PTS=5;
      STATE='menu'; menuScreen='mode';
    }
  }

  // Network traffic ticks — no-ops unless an online match is active
  netMaybeBroadcastState(now);
  netMaybeSendInput(now);

  prevES=eSpaceNow;
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
